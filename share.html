<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏐 排球零打報名系統</title>

  <!-- Open Graph / Social Preview (updated dynamically by JS) -->
  <meta property="og:type" content="website" />
  <meta id="ogTitle" property="og:title" content="🏐 排球零打報名系統" />
  <meta id="ogDesc" property="og:description" content="點擊查看活動詳情並報名參加！" />
  <meta property="og:image" content="https://volleyballplayoff.web.app/og-default.png" />
  <meta name="twitter:card" content="summary" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%); font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { background: white; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.10); padding: 32px 28px; max-width: 420px; width: 100%; }
    .ball { font-size: 2.8rem; display: block; text-align: center; animation: bounce 0.8s infinite alternate; margin-bottom: 12px; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    .loading { text-align: center; color: #6b7280; }
    .loading p { font-size: 0.9rem; margin-top: 4px; }

    .session-header { text-align: center; margin-bottom: 20px; }
    .session-emoji { font-size: 2.4rem; display: block; margin-bottom: 8px; }
    .session-title { font-size: 1.3rem; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; line-height: 1.3; }
    .session-type { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 2px 10px; border-radius: 99px; margin-top: 4px; }
    .type-mixed { background: #ede9fe; color: #7c3aed; }
    .type-male { background: #dbeafe; color: #1d4ed8; }
    .type-female { background: #fce7f3; color: #be185d; }
    .type-other { background: #f3f4f6; color: #374151; }

    .info-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .info-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: #f8f9ff; border-radius: 12px; }
    .info-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .info-label { font-size: 0.7rem; color: #6b7280; font-weight: 500; }
    .info-value { font-size: 0.9rem; color: #1f2937; font-weight: 500; line-height: 1.4; }

    .join-btn { display: block; width: 100%; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 14px; padding: 15px; font-size: 1rem; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
    .join-btn:active { transform: scale(0.97); }

    .error { text-align: center; color: #ef4444; padding: 8px; }
    .back-link { display: block; text-align: center; margin-top: 14px; font-size: 0.8rem; color: #6b7280; text-decoration: none; }
    .back-link:hover { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loadingEl" class="loading">
      <span class="ball">🏐</span>
      <p>正在載入活動資訊…</p>
    </div>
    <div id="contentEl" style="display:none">
      <div class="session-header">
        <span class="session-emoji">🏐</span>
        <div class="session-title" id="sTitle"></div>
        <span class="session-type" id="sType"></span>
      </div>
      <div class="info-grid">
        <div class="info-row"><span class="info-icon">📅</span><div><div class="info-label">日期</div><div class="info-value" id="sDate"></div></div></div>
        <div class="info-row"><span class="info-icon">⏰</span><div><div class="info-label">時間</div><div class="info-value" id="sTime"></div></div></div>
        <div class="info-row"><span class="info-icon">📍</span><div><div class="info-label">地點</div><div class="info-value" id="sLocation"></div></div></div>
        <div class="info-row"><span class="info-icon">👤</span><div><div class="info-label">開團人</div><div class="info-value" id="sOrganizer"></div></div></div>
      </div>
      <a id="joinBtn" class="join-btn" href="#">🏐 前往報名</a>
      <a class="back-link" href="./">← 回首頁</a>
    </div>
    <div id="errorEl" style="display:none" class="error">
      <p>找不到此活動，可能已被刪除。</p>
      <a class="back-link" href="./">← 回首頁</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { firebaseConfig } from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Detect in-app browser (Messenger, LINE, Instagram…) — show open-in-browser prompt
    const _ua = navigator.userAgent;
    const _isIAB = /FBAN|FBAV|FB_IAB|Instagram|Line\/|NAVER|MicroMessenger|WebView|(iPhone|iPod|iPad)(?!.*Safari)/i.test(_ua)
      || (!!window.navigator.standalone === false && /Android/.test(_ua) && !/Chrome\//.test(_ua));
    if (_isIAB) {
      document.getElementById('loadingEl').innerHTML = `
        <div style="font-size:2.4rem;margin-bottom:12px;">🏐</div>
        <h2 style="font-size:1.1rem;font-weight:700;color:#1e1b4b;margin:0 0 8px;">請用瀏覽器開啟</h2>
        <p style="font-size:0.85rem;color:#6b7280;margin:0 0 18px;line-height:1.6;">Google 登入不支援 Messenger / LINE 內建瀏覽器。<br>請用 <strong>Safari</strong> 或 <strong>Chrome</strong> 開啟。</p>
        <button onclick="navigator.clipboard.writeText(location.href).then(()=>{this.textContent='✅ 已複製！'}).catch(()=>{})"
          style="background:#6366f1;color:#fff;border:none;border-radius:14px;padding:13px 28px;font-size:0.95rem;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;">
          📋 複製網址
        </button>
        <p style="font-size:0.72rem;color:#9ca3af;">複製後請到瀏覽器貼上並開啟</p>
      `;
    }

    // Get session ID from query string (?id=...) or path (/share/SESSION_ID)
    const params = new URLSearchParams(window.location.search);
    let sessionId = params.get('id');
    if (!sessionId) {
      // fallback: path-based /share/SESSION_ID (Firebase Hosting only)
      const parts = window.location.pathname.split('/').filter(Boolean);
      sessionId = parts[1] || null;
    }

    const base = window.location.origin + window.location.pathname.replace('share.html', '');

    if (!sessionId) {
      window.location.replace(base);
    } else {
      const snap = await getDoc(doc(db, 'sessions', sessionId)).catch(() => null);
      if (!snap || !snap.exists()) {
        document.getElementById('loadingEl').style.display = 'none';
        document.getElementById('errorEl').style.display = '';
      } else {
        const s = snap.data();

        // Format helpers
        const typeMap = { mixed: { label: '混打', cls: 'type-mixed' }, male: { label: '男生', cls: 'type-male' }, female: { label: '女生', cls: 'type-female' } };
        const typeInfo = typeMap[s.type] || { label: s.type || '其他', cls: 'type-other' };

        const formatDate = (d) => {
          if (!d) return '—';
          const [y, m, day] = d.split('-');
          const weekDays = ['日','一','二','三','四','五','六'];
          const wd = new Date(+y, +m-1, +day).getDay();
          return `${y}/${m}/${day}（週${weekDays[wd]}）`;
        };
        const formatTime = (t) => t ? t.replace(':', ' : ') : '—';

        const title = s.title || s.name || '排球活動';
        const desc = `📅 ${formatDate(s.date)}  ⏰ ${s.time || ''}  📍 ${s.location || ''}`;

        // Update OG tags (for crawlers that execute JS)
        document.title = `🏐 ${title} — 排球零打報名`;
        document.getElementById('ogTitle').setAttribute('content', `🏐 ${title}`);
        document.getElementById('ogDesc').setAttribute('content', desc);

        // Render page content
        document.getElementById('sTitle').textContent = title;
        const typeEl = document.getElementById('sType');
        typeEl.textContent = typeInfo.label;
        typeEl.className = 'session-type ' + typeInfo.cls;
        document.getElementById('sDate').textContent = formatDate(s.date);
        document.getElementById('sTime').textContent = s.time || '—';
        document.getElementById('sLocation').textContent = s.location || '—';
        document.getElementById('sOrganizer').textContent = s.creatorName || s.createdByName || '—';

        const joinUrl = `${base}?session=${encodeURIComponent(sessionId)}`;
        document.getElementById('joinBtn').href = joinUrl;

        document.getElementById('loadingEl').style.display = 'none';
        document.getElementById('contentEl').style.display = '';
      }
    }
  </script>
</body>
</html>

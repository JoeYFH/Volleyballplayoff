  function populateBringChips(sessionId, preselected = []) {
    selectedBringEquip.clear();
    const session = sessionsData[sessionId] || {};
    const equipment = session.equipment || [];
    const bringRow = document.getElementById('modalBringEquipRow');
    const bringChips = document.getElementById('modalBringChips');
    if (equipment.length) {
      bringRow.classList.remove('hidden');
      // Find which items are already claimed by confirmed (non-waitlisted) signups
      const allSignups = signupsCache[sessionId] || [];
      const sessLimit = session.limit || 0;
      const sessMaleLimit = session.maleLimit || 0;
      const sessFemaleLimit = session.femaleLimit || 0;
      const hasMixedLimits = sessMaleLimit > 0 || sessFemaleLimit > 0;
      const claimedByOthers = new Set();
      allSignups.forEach(s => {
        // Don't count current user's own signup as "claimed by others"
        if (currentUser && s.uid === currentUser.uid) return;
        // Don't count the signup being edited
        if (editingSignupId && s.id === editingSignupId) return;
        // Only count confirmed (non-waitlisted) signups
        const isWait = hasMixedLimits
          ? !!s.genderWait
          : !s.forceConfirmed && (s.forceWaitlisted || (sessLimit > 0 && s.position > sessLimit));
        if (isWait) return;
        (s.bringEquip || []).forEach(e => claimedByOthers.add(e));
      });
      bringChips.innerHTML = equipment.map(e => {
        const active = preselected.includes(e);
        if (active) selectedBringEquip.add(e);
        const claimed = claimedByOthers.has(e);
        let cls, extra = '';
        if (claimed) {
          cls = 'bring-chip text-xs px-3 py-1.5 rounded-full border border-gray-200 bg-gray-100 text-gray-400 cursor-not-allowed opacity-60';
          extra = ` title="${getLang()==='zh' ? '已有人幫忙帶' : 'Already claimed'}"`;
        } else if (active) {
          cls = 'bring-chip text-xs px-3 py-1.5 rounded-full border border-indigo-500 bg-indigo-500 text-white transition';
        } else {
          cls = 'bring-chip text-xs px-3 py-1.5 rounded-full border border-gray-200 bg-gray-50 text-gray-500 hover:border-indigo-300 hover:text-indigo-600 transition';
        }
        return `<button type="button" data-bring="${escHtml(e)}" ${claimed ? 'disabled' : ''} class="${cls}"${extra}>${escHtml(trEquip(e))}${claimed ? ' ✓' : ''}</button>`;
      }).join('');
    } else {
      bringRow.classList.add('hidden');
      bringChips.innerHTML = '';
    }
  }

  document.getElementById('modalBringEquipRow').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-bring]');
    if (!btn || btn.disabled) return;
    const val = btn.dataset.bring;
    if (selectedBringEquip.has(val)) {
      selectedBringEquip.delete(val);
      btn.className = 'bring-chip text-xs px-3 py-1.5 rounded-full border border-gray-200 bg-gray-50 text-gray-500 hover:border-indigo-300 hover:text-indigo-600 transition';
    } else {
      selectedBringEquip.add(val);
      btn.className = 'bring-chip text-xs px-3 py-1.5 rounded-full border border-indigo-500 bg-indigo-500 text-white transition';
    }
  });

  // ── Friend name localStorage ──
  function getRecentFriendNames() {
    try { return JSON.parse(localStorage.getItem('recentFriendNames') || '[]'); } catch { return []; }
  }
  function saveRecentFriendName(name) {
    if (!name) return;
    const names = getRecentFriendNames().filter(n => n !== name);
    names.unshift(name);
    localStorage.setItem('recentFriendNames', JSON.stringify(names.slice(0, 10)));
  }
  function updateFriendNameDatalist() {
    let dl = document.getElementById('friendNameDatalist');
    if (!dl) {
      dl = document.createElement('datalist');
      dl.id = 'friendNameDatalist';
      document.body.appendChild(dl);
      document.getElementById('modalFriendName').setAttribute('list', 'friendNameDatalist');
    }
    const names = getRecentFriendNames();
    dl.innerHTML = names.map(n => `<option value="${escHtml(n)}">`).join('');
  }

  window.openSignupModal = (sessionId, limit) => {
    activeSessionId = sessionId;
    activeSessionLimit = limit;
    activeSessionData = sessionsData[sessionId] || {};
    document.getElementById('signupModal').classList.remove('hidden');
    document.getElementById('modalName').value = '';
    document.getElementById('modalName').classList.remove('border-red-400', 'ring-2', 'ring-red-200');
    document.getElementById('modalNameError').classList.add('hidden');
    document.getElementById('modalLate').checked = false;
    document.getElementById('modalLateSection').classList.add('hidden');
    document.getElementById('modalLateTime').value = '';
    document.getElementById('modalFriend').checked = false;
    document.getElementById('modalFriendSection').classList.add('hidden');
    document.getElementById('modalFriendName').value = '';
    document.getElementById('lModalLate').textContent = tr('willBeLate');
    selectedBringEquip.clear();
    if (currentUser) document.getElementById('modalProfilePreview').classList.remove('hidden');
    const signupCount = (signupsCache[sessionId] || []).filter(s => !s.genderWait && (!limit || s.position <= limit)).length;
    const sessionIsFull = limit > 0 && signupCount >= limit;
    const zh = getLang() === 'zh';
    document.getElementById('hConfirmBtn').textContent = sessionIsFull
      ? (zh ? '⏳ 加入候補名單' : '⏳ Join Waitlist')
      : tr('confirmBtn');
    // Update friend name datalist
    updateFriendNameDatalist();
    // 重置性別 / reset gender
    selectedSelfGender = '';
    selectedFriendGender = '';
    resetGenderBtns('self');
    resetGenderBtns('friend');
    document.getElementById('modalGenderError').classList.add('hidden');
    document.getElementById('modalFriendGenderError').classList.add('hidden');
    // 混排場次才顯示性別欄，一開始只顯示自己的性別欄
    const isMixedSession = activeSessionData.type === 'mixed';
    document.getElementById('modalGenderRow').classList.toggle('hidden', !isMixedSession);
    // 朋友性別欄只在混排且有勾選幫朋友時才顯示（初始為隱藏）
    document.getElementById('modalFriendGenderRow').classList.toggle('hidden', !isMixedSession);
    // Populate pair-with dropdown from current signups
    const pairSel = document.getElementById('modalPair');
    const noPreference = getLang() === 'zh' ? '— 不指定 —' : '— No preference —';
    const signups = signupsCache[sessionId] || [];
    pairSel.innerHTML = `<option value="">${noPreference}</option>` +
      signups
        .filter(s => !currentUser || s.uid !== currentUser.uid)
        .map(s => `<option value="${escHtml(s.name)}">${escHtml(s.name)}</option>`)
        .join('');
    // Populate bring-equipment chips
    populateBringChips(sessionId);
  };
  window.closeSignupModal = () => {
    document.getElementById('signupModal').classList.add('hidden');
    editingSignupId = null;
  };

  window.openEditSignupModal = (sessionId, signupId) => {
    const signups = signupsCache[sessionId] || [];
    const signup = signups.find(s => s.id === signupId);
    if (!signup) return;
    activeSessionId = sessionId;
    editingSignupId = signupId;
    document.getElementById('signupModal').classList.remove('hidden');
    document.getElementById('modalLate').checked = !!signup.isLate;
    document.getElementById('modalLateSection').classList.toggle('hidden', !signup.isLate);
    document.getElementById('modalLateTime').value = signup.lateTime || '';
    document.getElementById('modalFriend').checked = !!signup.forFriend;
    document.getElementById('modalFriendSection').classList.toggle('hidden', !signup.forFriend);
    if (currentUser) document.getElementById('modalProfilePreview').classList.toggle('hidden', !!signup.forFriend);
    document.getElementById('modalFriendName').value = signup.forFriend || '';
    // 混排場次：恢復性別顯示狀態
    selectedSelfGender = '';
    selectedFriendGender = '';
    resetGenderBtns('self');
    resetGenderBtns('friend');
    const isMixedEdit = activeSessionData?.type === 'mixed';
    document.getElementById('modalGenderRow').classList.toggle('hidden', !isMixedEdit || !!signup.forFriend);
    document.getElementById('modalFriendGenderRow').classList.toggle('hidden', !isMixedEdit);
    if (isMixedEdit && signup.gender) {
      if (signup.forFriend) { selectedFriendGender = signup.gender; selectGenderBtn('friend', signup.gender); }
      else { selectedSelfGender = signup.gender; selectGenderBtn('self', signup.gender); }
    }
    // Populate pair dropdown
    const pairSel = document.getElementById('modalPair');
    const noPreference = getLang() === 'zh' ? '— 不指定 —' : '— No preference —';
    const allSignups = signupsCache[sessionId] || [];
    pairSel.innerHTML = `<option value="">${noPreference}</option>` +
      allSignups.filter(s => s.id !== signupId).map(s => `<option value="${escHtml(s.name)}">${escHtml(s.name)}</option>`).join('');
    pairSel.value = signup.pairWith || '';
    document.getElementById('hConfirmBtn').textContent = getLang() === 'zh' ? '💾 更新報名' : '💾 Update';
    // Populate bring-equipment chips with preselected
    populateBringChips(sessionId, signup.bringEquip || []);
  };

  document.getElementById('modalLate').addEventListener('change', e => {
    document.getElementById('modalLateSection').classList.toggle('hidden', !e.target.checked);
    if (e.target.checked && !document.getElementById('modalLateTime').value && activeSessionData.time) {
      const [hh, mm] = activeSessionData.time.split(':').map(Number);
      const d = new Date(0, 0, 0, hh, mm + 30);
      document.getElementById('modalLateTime').value =
        String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
  });
  document.getElementById('modalFriend').addEventListener('change', e => {
    const checked = e.target.checked;
    document.getElementById('modalFriendSection').classList.toggle('hidden', !checked);
    // 勾選幫朋友報名時：隱藏自己的個人資料區塊（互斥）
    document.getElementById('modalProfilePreview').classList.toggle('hidden', checked);
    // 幫朋友時「我會晚到」改為「晚到」
    document.getElementById('lModalLate').textContent = checked
      ? (getLang() === 'zh' ? '晚到' : 'Late arrival')
      : tr('willBeLate');
    // 混排場次：勾選幫朋友報名時隱藏自己的性別欄，只顯示朋友性別欄
    const isMixed = activeSessionData?.type === 'mixed';
    if (isMixed) {
      document.getElementById('modalGenderRow').classList.toggle('hidden', checked);
      document.getElementById('modalGenderError').classList.add('hidden');
    }
    if (!checked) { selectedFriendGender = ''; resetGenderBtns('friend'); }
  });

  // ── Gender selection helpers ──
  function resetGenderBtns(who) {
    const maleCls = 'flex-1 text-xs py-2 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 hover:border-blue-300 hover:text-blue-600 transition';
    const femCls  = 'flex-1 text-xs py-2 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 hover:border-pink-300 hover:text-pink-600 transition';
    document.getElementById(who === 'self' ? 'gSelfMale' : 'gFriendMale').className = maleCls;
    document.getElementById(who === 'self' ? 'gSelfFemale' : 'gFriendFemale').className = femCls;
  }

  function selectGenderBtn(who, gender) {
    resetGenderBtns(who);
    const btnId = who === 'self' ? (gender === 'male' ? 'gSelfMale' : 'gSelfFemale') : (gender === 'male' ? 'gFriendMale' : 'gFriendFemale');
    const activeCls = gender === 'male'
      ? 'flex-1 text-xs py-2 rounded-xl border border-blue-500 bg-blue-500 text-white transition'
      : 'flex-1 text-xs py-2 rounded-xl border border-pink-500 bg-pink-500 text-white transition';
    document.getElementById(btnId).className = activeCls;
  }

  ['gSelfMale','gSelfFemale'].forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
      const g = document.getElementById(id).dataset.gender;
      selectedSelfGender = g;
      selectGenderBtn('self', g);
      document.getElementById('modalGenderError').classList.add('hidden');
    });
  });

  ['gFriendMale','gFriendFemale'].forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
      const g = document.getElementById(id).dataset.gender;
      selectedFriendGender = g;
      selectGenderBtn('friend', g);
      document.getElementById('modalFriendGenderError').classList.add('hidden');
    });
  });

  document.getElementById('modalName').addEventListener('input', () => {
    document.getElementById('modalName').classList.remove('border-red-400', 'ring-2', 'ring-red-200');
    document.getElementById('modalNameError').classList.add('hidden');
  });

  document.getElementById('modalSubmitBtn').addEventListener('click', async () => {
    // Duplicate signup check (only for new self-signups, not edits or proxy signups)
    if (!editingSignupId && currentUser) {
      const forFriendName = document.getElementById('modalFriendName').value.trim();
      if (!forFriendName) {
        const existing = (signupsCache[activeSessionId] || []).find(
          s => s.uid === currentUser.uid && !s.forFriend
        );
        if (existing) {
          const zh = getLang() === 'zh';
          showModalMsg(zh ? '⚠️ 您已經報名過這個活動了！' : '⚠️ You have already signed up for this session!', 'error');
          return;
        }
      }
    }

    const nameInput = document.getElementById('modalName');
    const name = currentUser ? currentUser.displayName : nameInput.value.trim();
    if (!name) {
      nameInput.classList.add('border-red-400', 'ring-2', 'ring-red-200');
      const errEl = document.getElementById('modalNameError');
      errEl.textContent = tr('enterName');
      errEl.classList.remove('hidden');
      nameInput.focus();
      return;
    }
    nameInput.classList.remove('border-red-400', 'ring-2', 'ring-red-200');
    document.getElementById('modalNameError').classList.add('hidden');

    // 混排場次：性別為必選 / gender required for mixed sessions
    const forFriendNameCheck = document.getElementById('modalFriendName').value.trim();
    if (activeSessionData.type === 'mixed') {
      const needsSelfGender = !forFriendNameCheck && !selectedSelfGender;
      const needsFriendGender = !!forFriendNameCheck && !selectedFriendGender;
      if (needsSelfGender) {
        document.getElementById('modalGenderError').classList.remove('hidden');
        document.getElementById('modalGenderRow').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
      if (needsFriendGender) {
        document.getElementById('modalFriendGenderError').classList.remove('hidden');
        document.getElementById('modalFriendGenderRow').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
    }
    document.getElementById('modalGenderError')?.classList.add('hidden');
    document.getElementById('modalFriendGenderError')?.classList.add('hidden');

    const btn = document.getElementById('modalSubmitBtn');
    btn.disabled = true;
    document.getElementById('hConfirmBtn').textContent = tr('signingUp');

    try {
      // Determine gender for this signup
      const forFriendName = document.getElementById('modalFriendName').value.trim();
      let signupGender = '';
      if (activeSessionData.type === 'male') signupGender = 'male';
      else if (activeSessionData.type === 'female') signupGender = 'female';
      else if (activeSessionData.type === 'mixed') {
        signupGender = forFriendName ? selectedFriendGender : selectedSelfGender;
      }

      const signupPayload = {
        isLate: document.getElementById('modalLate').checked,
        lateTime: document.getElementById('modalLateTime').value.trim(),
        forFriend: forFriendName,
        pairWith: document.getElementById('modalPair').value.trim(),
        bringEquip: [...selectedBringEquip],
        gender: signupGender,
      };

      if (editingSignupId) {
        // Update existing signup
        await updateDoc(doc(db, 'sessions', activeSessionId, 'signups', editingSignupId), signupPayload);
        showModalMsg(getLang()==='zh' ? '✅ 已更新！' : '✅ Updated!', 'success');
      } else {
        // Create new signup
        const signupRef = await addDoc(collection(db, 'sessions', activeSessionId, 'signups'), {
          name,
          photoURL: currentUser?.photoURL || null,
          uid: currentUser?.uid || null,
          signedAt: serverTimestamp(),
          ...signupPayload,
        });
        if (currentUser) {
          await setDoc(doc(db, 'users', currentUser.uid, 'mySignups', signupRef.id), {
            sessionId: activeSessionId,
            signupId: signupRef.id,
            sessionTitle: activeSessionData.title || activeSessionData.date + ' 零打',
            sessionDate: activeSessionData.date || '',
            sessionTime: activeSessionData.time || '',
            sessionLocation: activeSessionData.location || '',
            sessionVenue: activeSessionData.venue || '',
            signedAt: Timestamp.now(),
          });
        }
        // Save friend name to localStorage if registering for a friend
        if (!editingSignupId && forFriendName) saveRecentFriendName(forFriendName);
        showModalMsg(tr('successMsg'), 'success');
      }
      setTimeout(closeSignupModal, 1200);
    } catch(e) {
      showModalMsg(tr('failMsg'), 'error');
    } finally {
      btn.disabled = false;
      document.getElementById('hConfirmBtn').textContent = tr('confirmBtn');
    }
  });

  function showModalMsg(msg, type) {
    if (type === 'error') {
      alert(msg);
      return;
    }
    const el = document.getElementById('modalMsg');
    el.textContent = msg;
    el.className = 'text-center text-sm text-green-600';
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 2000);
  }

  // ── Utils ──
  function formatDate(d) {
    if (!d) return '—';
    const dt = new Date(d + 'T00:00:00');
    if (getLang() === 'en') {
      return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', weekday:'short', year:'numeric' });
    }
    const days = ['日','一','二','三','四','五','六'];
    return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} (週${days[dt.getDay()]})`;
  }

  function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const _equipMap = { '標竿': 'Pole', '音響': 'Speaker', '球': 'Ball' };
  function trEquip(e) { return getLang() === 'zh' ? e : (_equipMap[e] || e); }
  function escAttr(s) { return (s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

  // ── Session Created Modal ──
  window.showSessionCreatedModal = (sessionId) => {
    const url = `${window.location.origin}${window.location.pathname}?session=${sessionId}`;
    document.getElementById('createdSessionUrl').textContent = url;
    document.getElementById('copyCreatedUrlBtn').textContent = '📋 ' + (getLang()==='zh' ? '複製連結' : 'Copy Link');
    document.getElementById('hCreatedTitle').textContent = getLang()==='zh' ? '場次建立成功！' : 'Session Created!';
    document.getElementById('hCreatedHint').textContent = getLang()==='zh' ? '分享以下連結讓大家報名' : 'Share this link for sign-ups';
    document.getElementById('sessionCreatedModal').classList.remove('hidden');
  };
  window.closeSessionCreatedModal = () => {
    document.getElementById('sessionCreatedModal').classList.add('hidden');
  };
  window.copyCreatedSessionUrl = () => {
    const url = document.getElementById('createdSessionUrl').textContent;
    const btn = document.getElementById('copyCreatedUrlBtn');
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✅ ' + (getLang()==='zh' ? '已複製！' : 'Copied!');
      setTimeout(() => { btn.textContent = '📋 ' + (getLang()==='zh' ? '複製連結' : 'Copy Link'); }, 2000);
    }).catch(() => { prompt(getLang()==='zh' ? '複製以下連結：' : 'Copy this link:', url); });
  };

  // ── Feedback ──
  window.openFeedbackModal = () => {
    document.getElementById('feedbackModal').classList.remove('hidden');
    document.getElementById('fbDesc').value = '';
    document.getElementById('fbMsg').classList.add('hidden');
    // Pre-fill email if logged in
    if (currentUser?.email) document.getElementById('fbEmail').value = currentUser.email;
  };
  window.closeFeedbackModal = () => {
    document.getElementById('feedbackModal').classList.add('hidden');
  };

  document.getElementById('fbSubmitBtn').addEventListener('click', async () => {
    const desc = document.getElementById('fbDesc').value.trim();
    if (!desc) {
      document.getElementById('fbDesc').focus();
      return;
    }
    const btn = document.getElementById('fbSubmitBtn');
    btn.disabled = true;
    document.getElementById('hFbSubmit').textContent = getLang()==='zh' ? '送出中...' : 'Submitting...';
    try {
      await addDoc(collection(db, 'feedback'), {
        email: document.getElementById('fbEmail').value.trim() || null,
        type: document.getElementById('fbType').value,
        urgency: document.getElementById('fbUrgency').value,
        description: desc,
        uid: currentUser?.uid || null,
        userName: currentUser?.displayName || null,
        createdAt: serverTimestamp(),
        status: 'pending',
      });
      const el = document.getElementById('fbMsg');
      el.textContent = getLang()==='zh' ? '✅ 感謝你的意見！' : '✅ Thanks for your feedback!';
      el.className = 'text-center text-sm text-green-600';
      el.classList.remove('hidden');
      setTimeout(closeFeedbackModal, 1500);
    } catch(e) {
      const el = document.getElementById('fbMsg');
      el.textContent = getLang()==='zh' ? '❌ 送出失敗，請再試一次' : '❌ Failed, please try again';
      el.className = 'text-center text-sm text-red-500';
      el.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      document.getElementById('hFbSubmit').textContent = getLang()==='zh' ? '📨 送出意見' : '📨 Submit';
    }
  });

  // ── Feedback i18n (in applyLang) ──
  function applyFeedbackLang() {
    const zh = getLang() === 'zh';
    document.getElementById('hFeedbackTitle').textContent = zh ? '💬 意見回饋' : '💬 Feedback';
    document.getElementById('lFeedbackEmail').textContent = zh ? 'Email（選填）' : 'Email (optional)';
    document.getElementById('lFeedbackType').textContent = zh ? '類型' : 'Type';
    document.getElementById('fbOptBug').textContent = zh ? '🐛 Bug / 錯誤回報' : '🐛 Bug Report';
    document.getElementById('fbOptFeature').textContent = zh ? '💡 功能建議' : '💡 Feature Request';
    document.getElementById('fbOptQuestion').textContent = zh ? '❓ 使用問題' : '❓ Question';
    document.getElementById('fbOptOther').textContent = zh ? '💬 其他' : '💬 Other';
    document.getElementById('lFeedbackUrgency').textContent = zh ? '緊急程度' : 'Urgency';
    document.getElementById('fbOptLow').textContent = zh ? '🟢 低' : '🟢 Low';
    document.getElementById('fbOptMedium').textContent = zh ? '🟡 中' : '🟡 Medium';
    document.getElementById('fbOptHigh').textContent = zh ? '🔴 高' : '🔴 High';
    document.getElementById('lFeedbackDesc').innerHTML = (zh ? '描述' : 'Description') + ' <span class="text-red-400">*</span>';
    document.getElementById('hFbSubmit').textContent = zh ? '📨 送出意見' : '📨 Submit';
  }

  // Init
  applyLang();
  applyFeedbackLang();
</script>
</body>
</html>

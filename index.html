<!DOCTYPE html>
<html id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <script>try{var _l=localStorage.getItem('lang')||((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en');document.documentElement.lang=_l==='zh'?'zh-TW':'en';}catch(e){document.documentElement.lang='zh-TW';}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏐 排球零打報名系統 | Volleyball Pickup Sign-up</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Volleyball Pickup Sign-up" />
  <meta property="og:description" content="Sign up for this week's volleyball pickup game! Check the schedule, location, and available spots." />
  <meta property="og:url" content="https://volleyballplayoff.web.app/" />
  <meta property="og:image" content="https://volleyballplayoff.web.app/og-image.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="zh_TW" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Volleyball Pickup Sign-up" />
  <meta name="twitter:description" content="Sign up for this week's volleyball pickup game! Check the schedule, location, and available spots." />
  <meta name="twitter:image" content="https://volleyballplayoff.web.app/og-image.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    .fade-in { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    input[type=checkbox]{accent-color:#4f46e5}
    .tag{display:inline-flex;align-items:center;gap:4px;background:#e0e7ff;color:#4338ca;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
    .sheet{transition:transform .3s ease,opacity .3s ease}
    .sheet.hidden-sheet{transform:translateY(100%);opacity:0;pointer-events:none}
    #mapSuggestions, .form-map-sug { position:absolute; z-index:50; background:white; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.1); max-height:200px; overflow-y:auto; width:100%; }
    #mapSuggestions li, .form-map-sug li { padding:10px 14px; font-size:13px; cursor:pointer; border-bottom:1px solid #f1f5f9; }
    #mapSuggestions li:last-child, .form-map-sug li:last-child { border-bottom:none; }
    #mapSuggestions li:hover, .form-map-sug li:hover { background:#f1f5f9; }
    #toastEl { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:#1e1b4b; color:#fff; padding:12px 24px; border-radius:14px; font-size:0.9rem; font-weight:600; box-shadow:0 4px 20px rgba(0,0,0,0.25); opacity:0; transition:opacity 0.25s, transform 0.25s; pointer-events:none; z-index:9999; white-space:nowrap; }
    #toastEl.show { opacity:1; transform:translateX(-50%) translateY(0); }
    html[lang="en"] input[type="date"], html[lang="en"] input[type="datetime-local"] { -webkit-locale: "en-GB"; }
    html[lang="en"] input[type="time"] { -webkit-locale: "en-GB"; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="toastEl"></div>
<div class="max-w-2xl mx-auto pb-24">

  <!-- Sticky Header -->
  <div class="sticky top-0 z-20 bg-gray-50 px-4 pt-4 pb-3 border-b border-gray-100">
    <div class="flex items-center justify-between">
      <div>
        <h1 id="hAppTitle" class="text-xl font-bold text-indigo-800">🏐 排球零打報名</h1>
        <p class="text-xs text-gray-400 flex items-center gap-1 mt-0.5">
          <span class="pulse-dot w-1.5 h-1.5 bg-green-400 rounded-full inline-block"></span>
          <span id="hLive">即時更新</span>
        </p>
      </div>
      <div class="flex items-center gap-2">
        <!-- Lang toggle -->
        <button id="langBtn" onclick="toggleLang()"
          class="text-xs font-medium px-2.5 py-1.5 rounded-lg bg-white border border-gray-200 text-gray-500 hover:border-indigo-300 hover:text-indigo-600 transition shadow-sm">
          EN
        </button>
        <!-- User -->
        <div id="userArea">
          <button id="loginBtn"
            class="flex items-center gap-1.5 border border-gray-200 bg-white rounded-xl px-3 py-2 text-xs text-gray-600 hover:bg-gray-50 active:scale-95 transition shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" />
            <span id="hLogin">Google 登入</span>
          </button>
          <div id="userInfo" class="hidden flex items-center gap-2">
            <img id="userPhoto" src="" alt="" class="w-8 h-8 rounded-full border border-white shadow-sm" />
            <div class="text-right">
              <p id="userName" class="text-xs font-medium text-gray-700 max-w-[80px] truncate"></p>
              <div class="flex items-center justify-end gap-1.5">
                <span id="adminBadgeMain" class="hidden text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-medium">Super Admin</span>
                <button id="logoutBtn" class="text-xs text-gray-400 hover:text-red-400 transition">登出</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Session Filter Tabs -->
    <div class="flex gap-1.5 mt-3 overflow-x-auto pb-0.5">
      <button id="sf-all" onclick="setFilter('all')"
        class="text-xs font-semibold px-3 py-1.5 rounded-xl bg-white border border-gray-200 text-gray-600 hover:border-indigo-300 transition shrink-0">所有</button>
      <button id="sf-open" onclick="setFilter('open')"
        class="text-xs font-semibold px-3 py-1.5 rounded-xl bg-indigo-600 text-white transition shrink-0">報名中</button>
      <button id="sf-past" onclick="setFilter('past')"
        class="text-xs font-semibold px-3 py-1.5 rounded-xl bg-white border border-gray-200 text-gray-600 hover:border-indigo-300 transition shrink-0">過去</button>
    </div>
    <div class="flex gap-1.5 mt-2 overflow-x-auto pb-0.5">
      <button id="sg-all" onclick="setGenderFilter('all')"
        class="text-xs px-3 py-1 rounded-lg bg-indigo-600 text-white font-semibold transition shrink-0">全部</button>
      <button id="sg-male" onclick="setGenderFilter('male')"
        class="text-xs px-3 py-1 rounded-lg bg-white border border-gray-200 text-gray-500 hover:border-indigo-300 transition shrink-0">♂ 男生</button>
      <button id="sg-female" onclick="setGenderFilter('female')"
        class="text-xs px-3 py-1 rounded-lg bg-white border border-gray-200 text-gray-500 hover:border-indigo-300 transition shrink-0">♀ 女生</button>
      <button id="sg-mixed" onclick="setGenderFilter('mixed')"
        class="text-xs px-3 py-1 rounded-lg bg-white border border-gray-200 text-gray-500 hover:border-indigo-300 transition shrink-0">⚥ 混排</button>
      <select id="sort-type-select" onchange="setSort()"
        class="ml-auto text-xs px-2 py-1 rounded-lg border border-gray-200 bg-white text-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-300 shrink-0">
        <option value="date">📅 日期</option>
        <option value="closeAt">⏰ 截止</option>
      </select>
      <select id="sort-dir-select" onchange="setSort()"
        class="text-xs px-2 py-1 rounded-lg border border-gray-200 bg-white text-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-300 shrink-0">
        <option value="asc" selected>近→遠</option>
        <option value="desc">遠→近</option>
      </select>
    </div>
  </div>

  <div class="px-4 pt-4">
  <!-- Sessions List -->
  <div id="sessionsList" class="space-y-4"></div>
  <div id="noSessionsMsg" class="hidden text-center py-10 text-gray-400">
    <div class="text-4xl mb-2">📭</div>
    <p id="hNoSessions" class="text-sm">目前沒有即將舉行的場次</p>
  </div>
  <div id="loadingSpinner" class="text-center py-10 text-gray-400">
    <div class="animate-spin text-3xl">⏳</div>
  </div>
  </div>

<!-- FAB: Create Session -->
<div class="fixed bottom-6 right-4 flex flex-col items-end gap-2 z-30">
  <div id="fabMenu" class="hidden flex-col items-end gap-2 mb-2">
    <a href="my-sessions.html"
      class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium text-gray-700 shadow-md hover:bg-gray-50 transition">
      <span id="hMySessions">我的開場</span> 📋
    </a>
  </div>
  <div class="flex flex-wrap justify-end gap-2">
    <button id="mySignupsBtn"
      class="hidden bg-white border border-green-200 text-green-700 rounded-xl px-4 py-3 text-sm font-semibold shadow-md hover:bg-green-50 active:scale-95 transition">
      ✅ <span id="hMySignupsBtn">我的報名</span>
    </button>
    <button id="mySessionsBtn"
      class="hidden bg-white border border-indigo-200 text-indigo-600 rounded-xl px-4 py-3 text-sm font-semibold shadow-md hover:bg-indigo-50 active:scale-95 transition">
      📋 <span id="hMySessionsBtn">我的開場</span>
    </button>
    <button id="createBtn"
      class="hidden bg-indigo-600 text-white rounded-xl px-5 py-3 text-sm font-semibold shadow-lg hover:bg-indigo-700 active:scale-95 transition">
      <span id="hCreate">+ 建立場次</span>
    </button>
  </div>
</div>
<!-- Feedback FAB -->
<button id="feedbackBtn" onclick="openFeedbackModal()"
  class="fixed bottom-6 left-4 z-30 bg-white border border-gray-200 text-gray-500 rounded-full w-10 h-10 flex items-center justify-center shadow-md hover:bg-gray-50 hover:text-indigo-600 transition text-lg"
  title="意見回饋">💬</button>

<!-- Feedback Modal -->
<div id="feedbackModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeFeedbackModal()"></div>
  <div class="absolute bottom-0 left-0 right-0 max-h-[85vh] overflow-y-auto bg-white rounded-t-2xl shadow-xl px-5 py-6 space-y-4">
    <div class="flex items-center justify-between mb-2">
      <h2 id="hFeedbackTitle" class="font-bold text-gray-800">💬 意見回饋</h2>
      <button onclick="closeFeedbackModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
    </div>
    <div>
      <label id="lFeedbackEmail" class="block text-sm font-medium text-gray-600 mb-1">Email（選填）</label>
      <input id="fbEmail" type="email" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
    </div>
    <div>
      <label id="lFeedbackType" class="block text-sm font-medium text-gray-600 mb-1">類型</label>
      <select id="fbType" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
        <option value="bug" id="fbOptBug">🐛 Bug / 錯誤回報</option>
        <option value="feature" id="fbOptFeature">💡 功能建議</option>
        <option value="question" id="fbOptQuestion">❓ 使用問題</option>
        <option value="other" id="fbOptOther">💬 其他</option>
      </select>
    </div>
    <div>
      <label id="lFeedbackUrgency" class="block text-sm font-medium text-gray-600 mb-1">緊急程度</label>
      <select id="fbUrgency" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
        <option value="low" id="fbOptLow">🟢 低</option>
        <option value="medium" id="fbOptMedium">🟡 中</option>
        <option value="high" id="fbOptHigh">🔴 高</option>
      </select>
    </div>
    <div>
      <label id="lFeedbackDesc" class="block text-sm font-medium text-gray-600 mb-1">描述 <span class="text-red-400">*</span></label>
      <textarea id="fbDesc" rows="4" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-300"></textarea>
    </div>
    <button id="fbSubmitBtn"
      class="w-full bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50">
      <span id="hFbSubmit">📨 送出意見</span>
    </button>
    <p id="fbMsg" class="text-center text-sm hidden"></p>
  </div>
</div>

<!-- Create Session Sheet -->
<div id="createSheet" class="fixed inset-0 z-40 hidden">
  <div id="sheetOverlay" class="absolute inset-0 bg-black/40" onclick="closeCreateSheet()"></div>
  <div class="absolute bottom-0 left-0 right-0 max-h-[92vh] overflow-y-auto overflow-x-hidden bg-white rounded-t-2xl shadow-xl">
    <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center justify-between">
      <h2 id="hCreateTitle" class="font-bold text-gray-800">建立新場次</h2>
      <button onclick="closeCreateSheet()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
    </div>
    <div class="px-5 py-4 space-y-4">

      <!-- Template Dropdown -->
      <div id="templateDropdownRow" class="hidden">
        <label id="lTemplatePick" class="block text-sm font-medium text-gray-600 mb-1">套用範本</label>
        <div class="flex gap-2">
          <select id="templateSelect"
            class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
            <option value="">— 不套用 —</option>
          </select>
          <button id="applyTemplateBtn" type="button" onclick="applySelectedTemplate()"
            class="hidden px-3 py-2 bg-indigo-50 text-indigo-600 text-xs font-semibold rounded-xl hover:bg-indigo-100 transition shrink-0">套用</button>
        </div>
      </div>

      <!-- Form fields injected from session-form.js -->
      <div id="formFieldsContainer" class="contents"></div>

      <div class="flex gap-3">
        <button id="submitCreateBtn"
          class="flex-1 bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50">
          <span id="hCreateBtn">🚀 建立場次</span>
        </button>
        <button id="saveTemplateBtn" type="button" onclick="saveTemplate('new')"
          class="px-4 bg-gray-100 text-gray-600 rounded-xl py-3 font-medium text-sm hover:bg-gray-200 active:scale-95 transition">
          💾 <span id="hSaveTemplate">存為範本</span>
        </button>
      </div>
      <div id="templateUpdateRow" class="hidden grid grid-cols-2 gap-2">
        <button type="button" onclick="saveTemplate('update')" id="updateTemplateBtn"
          class="bg-blue-50 text-blue-600 rounded-xl py-2.5 font-medium text-sm hover:bg-blue-100 transition text-center">
          🔄 更新範本
        </button>
        <button type="button" onclick="saveTemplate('new')" id="saveNewTemplateBtn"
          class="bg-gray-50 text-gray-600 rounded-xl py-2.5 font-medium text-sm hover:bg-gray-100 transition text-center border border-gray-200">
          💾 另存新範本
        </button>
      </div>
      <p id="createMsg" class="text-center text-sm hidden"></p>
    </div>
  </div>
</div>

<!-- Session Created Success Modal -->
<div id="sessionCreatedModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40"></div>
  <div class="absolute inset-0 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm relative">
      <div class="text-center mb-4">
        <div class="text-5xl mb-3">🎉</div>
        <h3 id="hCreatedTitle" class="text-lg font-bold text-gray-800 mb-1">場次建立成功！</h3>
        <p id="hCreatedHint" class="text-sm text-gray-500">分享以下連結讓大家報名</p>
      </div>
      <div class="bg-gray-50 rounded-xl px-4 py-3 mb-4 overflow-hidden">
        <p id="createdSessionUrl" class="text-xs text-indigo-600 break-all font-mono"></p>
      </div>
      <button id="copyCreatedUrlBtn" onclick="copyCreatedSessionUrl()"
        class="w-full bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition mb-2">
        📋 複製連結
      </button>
      <button onclick="closeSessionCreatedModal()"
        class="w-full bg-gray-100 text-gray-600 rounded-xl py-2 text-sm hover:bg-gray-200 transition">
        關閉
      </button>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div id="shareModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeShareModal()"></div>
  <div class="absolute inset-0 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm relative">
      <div class="text-center mb-4">
        <div class="text-4xl mb-2">🔗</div>
        <h3 id="hShareModalTitle" class="text-lg font-bold text-gray-800 mb-1">分享活動連結</h3>
        <p id="hShareModalHint" class="text-sm text-gray-500">複製以下連結讓大家報名</p>
      </div>
      <div class="bg-gray-50 rounded-xl px-4 py-3 mb-4 overflow-x-auto cursor-text" onclick="document.getElementById('shareModalUrl').select?.()">
        <p id="shareModalUrl" class="text-xs text-indigo-600 break-all font-mono select-all"></p>
      </div>
      <button id="copyShareUrlBtn" onclick="copyShareUrl()"
        class="w-full bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition mb-2">
        📋 <span id="hCopyShareBtn">複製連結</span>
      </button>
      <button id="nativeShareBtn" onclick="nativeShareUrl()"
        class="hidden w-full bg-gray-100 text-gray-700 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-200 active:scale-95 transition mb-2">
        ↗ <span id="hNativeShareBtn">分享</span>
      </button>
      <button onclick="closeShareModal()"
        class="w-full bg-gray-100 text-gray-600 rounded-xl py-2 text-sm hover:bg-gray-200 transition">
        <span id="hShareModalClose">關閉</span>
      </button>
    </div>
  </div>
</div>

<!-- Signup Modal -->
<div id="signupModal" class="fixed inset-0 z-40 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeSignupModal()"></div>
  <div class="absolute bottom-0 left-0 right-0 max-h-[85vh] overflow-y-auto bg-white rounded-t-2xl shadow-xl">
    <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center justify-between">
      <h2 id="modalFormTitle" class="font-bold text-gray-800">✍️ 填寫報名資料</h2>
      <button onclick="closeSignupModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
    </div>
    <div class="px-5 py-4 space-y-3">

      <div id="modalProfilePreview" class="hidden flex items-center gap-3 bg-indigo-50 rounded-xl px-4 py-3">
        <img id="modalPhoto" src="" alt="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" />
        <div>
          <p id="modalDisplayName" class="text-sm font-medium text-indigo-800"></p>
          <p id="hGoogleProfile" class="text-xs text-indigo-400">以 Google 帳號報名</p>
        </div>
      </div>

      <div id="modalNameRow">
        <label id="lModalName" class="block text-sm font-medium text-gray-600 mb-1">姓名 / 暱稱 <span class="text-red-400">*</span></label>
        <input id="modalName" type="text" maxlength="20"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
        <p id="modalNameError" class="hidden mt-1 text-xs text-red-500"></p>
      </div>

      <div class="flex items-center gap-2">
        <input type="checkbox" id="modalLate" class="w-4 h-4" />
        <label id="lModalLate" for="modalLate" class="text-sm text-gray-600">我會晚到</label>
      </div>
      <div id="modalLateSection" class="hidden ml-6">
        <input id="modalLateTime" type="text"
          class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>

      <!-- 自己的性別（混排場次用）/ own gender for mixed sessions -->
      <div id="modalGenderRow" class="hidden">
        <label id="lModalGender" class="block text-sm font-medium text-gray-600 mb-2">性別 <span class="text-red-400">*</span></label>
        <div class="flex gap-2">
          <button type="button" id="gSelfMale" data-gender="male"
            class="flex-1 text-xs py-2 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 hover:border-blue-300 hover:text-blue-600 transition">♂ 男生</button>
          <button type="button" id="gSelfFemale" data-gender="female"
            class="flex-1 text-xs py-2 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 hover:border-pink-300 hover:text-pink-600 transition">♀ 女生</button>
        </div>
        <p id="modalGenderError" class="hidden mt-1 text-xs text-red-500">請選擇性別</p>
      </div>

      <div class="flex items-center gap-2">
        <input type="checkbox" id="modalFriend" class="w-4 h-4" />
        <label id="lModalFriend" for="modalFriend" class="text-sm text-gray-600">幫朋友報名</label>
      </div>
      <div id="modalFriendSection" class="hidden ml-6 space-y-2">
        <input id="modalFriendName" type="text" maxlength="20"
          class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
        <!-- 代報名性別（混排才顯示）/ gender for proxy (mixed sessions only) -->
        <div id="modalFriendGenderRow" class="hidden">
          <div class="flex gap-2">
            <button type="button" id="gFriendMale" data-gender="male"
              class="flex-1 text-xs py-2 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 hover:border-blue-300 hover:text-blue-600 transition">♂ 男生</button>
            <button type="button" id="gFriendFemale" data-gender="female"
              class="flex-1 text-xs py-2 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 hover:border-pink-300 hover:text-pink-600 transition">♀ 女生</button>
          </div>
          <p id="modalFriendGenderError" class="hidden mt-1 text-xs text-red-500">請選擇性別</p>
        </div>
      </div>

      <div>
        <label id="lModalPair" class="block text-sm text-gray-600 mb-1">希望跟誰搭檔？（選填）</label>
        <select id="modalPair"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">

      <button id="modalSubmitBtn"
        class="w-full bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition-all">
        <span id="hConfirmBtn">🙋 確認報名</span>
      </button>
      <p id="modalMsg" class="text-center text-sm hidden"></p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getFirestore, doc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getDocs, serverTimestamp, Timestamp, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
  import { firebaseConfig, ADMIN_EMAILS } from './firebase-config.js';
  import { tr, getLang, setLang, t } from './i18n.js';
  import { sessionFormHTML, FORM_IDS_INDEX, FORM_FNS_INDEX } from './session-form.js';

  // Inject shared form fields before any DOM setup
  const _formInputLang = (localStorage.getItem('lang') || 'zh') === 'zh' ? 'zh-TW' : 'en-GB';
  document.getElementById('formFieldsContainer').innerHTML = sessionFormHTML(FORM_IDS_INDEX, FORM_FNS_INDEX, _formInputLang);

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // Detect in-app browsers that block Google OAuth (Messenger, LINE, Instagram, FB…)
  const ua = navigator.userAgent;
  const isInAppBrowser = /FBAN|FBAV|FB_IAB|Instagram|Line\/|NAVER|MicroMessenger|WebView|(iPhone|iPod|iPad)(?!.*Safari)/i.test(ua)
    || (!!window.navigator.standalone === false && /Android/.test(ua) && !/Chrome\//.test(ua));

  if (isInAppBrowser) {
    let iabZh = /^zh/i.test(navigator.language || '');
    function renderIabOverlay() {
      const zh = iabZh;
      const el = document.getElementById('inAppBrowserOverlay');
      if (!el) return;
      el.innerHTML = `
        <button onclick="window._iabToggleLang()" style="position:absolute;top:16px;right:16px;background:#f3f4f6;border:none;border-radius:10px;padding:6px 14px;font-size:0.85rem;font-weight:600;color:#6366f1;cursor:pointer;">
          ${zh ? 'EN' : '中'}
        </button>
        <div style="font-size:3rem;margin-bottom:16px;">🏐</div>
        <h2 style="font-size:1.2rem;font-weight:700;color:#1e1b4b;margin:0 0 12px;">
          ${zh ? '請用瀏覽器開啟' : 'Open in Browser'}
        </h2>
        <p style="font-size:0.9rem;color:#6b7280;margin:0 0 8px;line-height:1.6;">
          ${zh
            ? 'Google 登入不支援在 Messenger / LINE 等 App 內建瀏覽器中使用。'
            : 'Google sign-in is not supported in in-app browsers (Messenger, LINE, etc.).'}
        </p>
        <p style="font-size:0.9rem;color:#374151;margin:0 0 24px;line-height:1.6;">
          ${zh
            ? '請複製連結後用 <strong>Safari</strong> 或 <strong>Chrome</strong> 開啟。'
            : 'Please copy the link and open it in <strong>Safari</strong> or <strong>Chrome</strong>.'}
        </p>
        <button id="iabCopyBtn" onclick="
          navigator.clipboard.writeText(location.href).then(()=>{
            this.textContent = ${zh} ? '✅ 已複製！' : '✅ Copied!';
          }).catch(()=>{ prompt('', location.href); });
        " style="background:#6366f1;color:#fff;border:none;border-radius:14px;padding:14px 32px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;max-width:320px;margin-bottom:10px;">
          📋 ${zh ? '複製網址' : 'Copy URL'}
        </button>
        <p style="font-size:0.75rem;color:#9ca3af;">
          ${zh ? '複製後請到瀏覽器貼上並開啟' : 'Paste the URL in your browser to open'}
        </p>
      `;
    }
    window._iabToggleLang = () => { iabZh = !iabZh; renderIabOverlay(); };
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.createElement('div');
      overlay.id = 'inAppBrowserOverlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:system-ui,sans-serif;';
      document.body.appendChild(overlay);
      renderIabOverlay();
    });
  }

  // Handle redirect result (fallback path) / 處理 redirect 登入結果（備用路徑）
  getRedirectResult(auth).catch(() => {});

  async function signIn() {
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
        signInWithRedirect(auth, provider);
      }
    }
  }

  let currentUser = null;
  let activeSessionId = null; // for signup modal
  let activeSessionLimit = 0;
  let activeSessionData = {}; // store session info for mySignups
  let selectedEquip = new Set();
  let customEquipItems = []; // 自訂新增的用具 / custom equipment items
  let selectedBringEquip = new Set();
  let selectedSelfGender = ''; // 自己的性別 / own gender
  let selectedFriendGender = ''; // 代報名朋友的性別 / friend gender
  let mapDebounce = null;
  let userSignupMap = {}; // sessionId -> signupId for current user
  let sessionsData = {}; // sessionId -> session object
  let signupsCache = {}; // sessionId -> signup items[]
  let editingSignupId = null; // if set, edit mode in signup modal
  let allSessionsCache = []; // all loaded sessions for filtering
  let currentFilter = 'open';
  let currentGenderFilter = 'all';
  let currentSort = 'date_asc';
  let creatorPhotoCache = {}; // uid -> photoURL cache for organizer photos

  const TYPE_LABEL = () => ({ '': tr('noType'), mixed: tr('mixed'), male: tr('male'), female: tr('female') });

  // ── Language ──
  window.toggleLang = () => {
    const newLang = getLang() === 'zh' ? 'en' : 'zh';
    setLang(newLang);
    applyLang();
    applyFeedbackLang();
    applyFilter();
  };

  function applyLang() {
    const lang = getLang();
    document.getElementById('htmlRoot').lang = lang === 'zh' ? 'zh-TW' : 'en';
    document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
    const _il = lang === 'zh' ? 'zh-TW' : 'en-GB';
    document.querySelectorAll('input[type="date"], input[type="datetime-local"], input[type="time"]').forEach(el => {
      const v = el.value, t = el.type;
      el.lang = _il; el.type = 'text'; el.type = t; el.value = v;
    });
    document.getElementById('langBtn').textContent = lang === 'zh' ? 'EN' : '中';
    document.getElementById('hAppTitle').textContent = '🏐 ' + tr('appTitle');
    document.getElementById('hLive').textContent = tr('liveUpdate');
    document.getElementById('hLogin').textContent = tr('googleLogin');
    document.getElementById('logoutBtn').textContent = tr('logout');
    document.getElementById('hCreate').textContent = tr('createSession');
    document.getElementById('hMySessions').textContent = tr('mySessions');
    document.getElementById('hMySessionsBtn').textContent = tr('mySessions');
    document.getElementById('hMySignupsBtn').textContent = getLang()==='zh' ? '我的報名' : 'My Sign-ups';
    document.getElementById('hNoSessions').textContent = tr('noSessions');
    document.getElementById('hCreateTitle').textContent = tr('createTitle');
    document.getElementById('lTitle').textContent = tr('fTitle');
    document.getElementById('fTitle').placeholder = tr('fTitlePh');
    document.getElementById('lDate').innerHTML = tr('fDate') + ' <span class="text-red-400">*</span>';
    document.getElementById('lTime').innerHTML = tr('fTime') + ' <span class="text-red-400">*</span>';
    document.getElementById('lLocation').innerHTML = tr('fLocation') + ' <span class="text-red-400">*</span>';
    document.getElementById('fLocation').placeholder = tr('fLocationPh');
    document.getElementById('lVenue').textContent = tr('fVenue');
    document.getElementById('fVenue').placeholder = tr('fVenuePh');
    document.getElementById('lLimit').textContent = tr('fLimit');
    document.getElementById('lType').textContent = tr('fType');
    document.getElementById('lMaleLimit').textContent = getLang()==='zh' ? '男生名額（0=不限）' : 'Male Limit (0=unlimited)';
    document.getElementById('lFemaleLimit').textContent = getLang()==='zh' ? '女生名額（0=不限）' : 'Female Limit (0=unlimited)';
    document.getElementById('oMixed').textContent = tr('mixed');
    document.getElementById('oMale').textContent = tr('male');
    document.getElementById('oFemale').textContent = tr('female');
    document.getElementById('lEquip').textContent = tr('fEquip');
    document.getElementById('fEquipCustom').placeholder = tr('fEquipPh');
    document.getElementById('lOpenWhen').textContent = getLang()==='zh' ? '開放報名時間' : 'Signup Open Time';
    document.getElementById('oOpenNow').textContent = getLang()==='zh' ? '立即開放' : 'Open immediately';
    document.getElementById('oOpenHours').textContent = getLang()==='zh' ? '開賽前 N 小時' : 'N hours before game';
    document.getElementById('oOpenDays').textContent = getLang()==='zh' ? '開賽前 N 天' : 'N days before game';
    document.getElementById('oOpenCustom').textContent = getLang()==='zh' ? '指定時間' : 'Custom time';
    const hintEl = document.getElementById('hOpenAtHint');
    if (hintEl) hintEl.textContent = tr('fOpenAtHint');
    document.getElementById('lCloseAt').textContent = getLang()==='zh'
      ? '結束報名時間（選填，預設為活動開始時間）'
      : 'Signup Close Time (optional, defaults to session start time)';
    document.getElementById('hCloseAtHint').textContent = getLang()==='zh' ? '到時自動關閉報名' : 'Signup will close automatically';
    document.getElementById('oCloseGameStart').textContent = getLang()==='zh' ? '直到活動開始' : 'Until game starts';
    document.getElementById('oCloseHours').textContent = getLang()==='zh' ? '開賽前 N 小時' : 'N hours before game';
    document.getElementById('oCloseDays').textContent = getLang()==='zh' ? '開賽前 N 天' : 'N days before game';
    document.getElementById('oCloseCustom').textContent = getLang()==='zh' ? '自訂時間' : 'Custom time';
    onCloseWhenChange();
    document.getElementById('lNote').textContent = tr('fNote');
    document.getElementById('lNoteHint').textContent = getLang()==='zh'
      ? '⚠️ 此備註只有開場者能看到，不會顯示在公開報名頁面上'
      : '⚠️ This note is only visible to the session creator, not shown publicly';
    document.getElementById('fNote').placeholder = tr('fNotePh');
    document.getElementById('hCreateBtn').textContent = tr('createBtn');
    document.getElementById('hSaveTemplate').textContent = getLang()==='zh' ? '存為範本' : 'Save Template';
    const updateTemplateBtn = document.getElementById('updateTemplateBtn'); if (updateTemplateBtn) updateTemplateBtn.textContent = getLang()==='zh' ? '🔄 更新範本' : '🔄 Update Template';
    const saveNewTemplateBtn = document.getElementById('saveNewTemplateBtn'); if (saveNewTemplateBtn) saveNewTemplateBtn.textContent = getLang()==='zh' ? '💾 另存新範本' : '💾 Save as New';
    document.getElementById('hCreateTitle').textContent = getLang()==='zh' ? '建立新場次' : 'Create New Session';
    document.getElementById('lTemplatePick').textContent = getLang()==='zh' ? '套用範本' : 'Apply Template';
    document.getElementById('applyTemplateBtn').textContent = getLang()==='zh' ? '套用' : 'Apply';
    // Update equipment chip labels
    const chipLabels = { '標竿': getLang()==='zh'?'🏁 標竿':'🏁 Pole', '音響': getLang()==='zh'?'🔊 音響':'🔊 Speaker', '球': getLang()==='zh'?'🏐 球':'🏐 Ball' };
    document.querySelectorAll('#equipChips [data-equip]').forEach(btn => {
      if (chipLabels[btn.dataset.equip]) btn.textContent = chipLabels[btn.dataset.equip];
    });
    onOpenWhenChange();
    document.getElementById('modalFormTitle').textContent = tr('formTitle');
    document.getElementById('hGoogleProfile').textContent = tr('googleProfile');
    document.getElementById('lModalName').innerHTML = tr('nameLabel') + ' <span class="text-red-400">*</span>';
    document.getElementById('modalName').placeholder = tr('namePh');
    document.getElementById('lModalLate').textContent = tr('willBeLate');
    document.getElementById('modalLateTime').placeholder = tr('lateTimePh');
    document.getElementById('lModalFriend').textContent = tr('forFriend');
    document.getElementById('modalFriendName').placeholder = tr('friendPh');
    document.getElementById('lModalPair').textContent = tr('pairLabel');
    const pairSel = document.getElementById('modalPair');
    if (pairSel.options[0] && pairSel.options[0].value === '') {
      pairSel.options[0].textContent = getLang() === 'zh' ? '— 不指定 —' : '— No preference —';
    }
    const lBring = document.getElementById('lModalBringEquip');
    if (lBring) lBring.textContent = getLang()==='zh' ? '🎒 我可以幫忙帶' : '🎒 I can bring';
    document.getElementById('lModalGender').textContent = getLang()==='zh' ? '性別' : 'Gender';
    document.getElementById('gSelfMale').textContent = getLang()==='zh' ? '♂ 男生' : '♂ Male';
    document.getElementById('gSelfFemale').textContent = getLang()==='zh' ? '♀ 女生' : '♀ Female';
    document.getElementById('gFriendMale').textContent = getLang()==='zh' ? '♂ 男生' : '♂ Male';
    document.getElementById('gFriendFemale').textContent = getLang()==='zh' ? '♀ 女生' : '♀ Female';
    document.getElementById('hConfirmBtn').textContent = tr('confirmBtn');
    // Gender filter buttons
    const zh2 = getLang() === 'zh';
    document.getElementById('sg-all').textContent    = zh2 ? '全部'   : 'All';
    document.getElementById('sg-male').textContent   = zh2 ? '♂ 男生' : '♂ Male';
    document.getElementById('sg-female').textContent = zh2 ? '♀ 女生' : '♀ Female';
    document.getElementById('sg-mixed').textContent  = zh2 ? '⚥ 混排' : '⚥ Mixed';
    // Sort select options
    const sortTypeSel = document.getElementById('sort-type-select');
    if (sortTypeSel) {
      sortTypeSel.options[0].text = zh2 ? '📅 日期' : '📅 Date';
      sortTypeSel.options[1].text = zh2 ? '⏰ 截止' : '⏰ Close';
    }
    const sortDirSel = document.getElementById('sort-dir-select');
    if (sortDirSel) {
      sortDirSel.options[0].text = zh2 ? '近→遠' : 'Near→Far';
      sortDirSel.options[1].text = zh2 ? '遠→近' : 'Far→Near';
    }
    // Re-apply filter with updated labels
    applyFilter();
  }

  // ── Auth ──
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      if (user.photoURL) creatorPhotoCache[user.uid] = user.photoURL;
      document.getElementById('loginBtn').classList.add('hidden');
      document.getElementById('userInfo').classList.remove('hidden');
      document.getElementById('userPhoto').src = user.photoURL || '';
      document.getElementById('userName').textContent = user.displayName || user.email;
      document.getElementById('createBtn').classList.remove('hidden');
      document.getElementById('mySessionsBtn').classList.remove('hidden');
      document.getElementById('mySignupsBtn').classList.remove('hidden');
      document.getElementById('modalProfilePreview').classList.remove('hidden');
      document.getElementById('modalPhoto').src = user.photoURL || '';
      document.getElementById('modalDisplayName').textContent = user.displayName || user.email;
      document.getElementById('modalNameRow').classList.add('hidden');
      const isAdminUser = (ADMIN_EMAILS || []).includes(user.email);
      const adminBadgeMain = document.getElementById('adminBadgeMain');
      if (adminBadgeMain) adminBadgeMain.classList.toggle('hidden', !isAdminUser);
      // Re-subscribe signups to update "signed" badges for logged-in user
      Object.keys(signupUnsubs).forEach(id => { signupUnsubs[id](); delete signupUnsubs[id]; });
      const allSessions = Object.values(sessionsData);
      if (allSessions.length) allSessions.forEach(s => subscribeSignups(s.id, s.limit || 0, s.maleLimit || 0, s.femaleLimit || 0));
    } else {
      document.getElementById('loginBtn').classList.remove('hidden');
      document.getElementById('userInfo').classList.add('hidden');
      document.getElementById('createBtn').classList.add('hidden');
      document.getElementById('mySessionsBtn').classList.add('hidden');
      document.getElementById('mySignupsBtn').classList.add('hidden');
      document.getElementById('modalProfilePreview').classList.add('hidden');
      document.getElementById('modalNameRow').classList.remove('hidden');
    }
  });

  document.getElementById('loginBtn').addEventListener('click', signIn);
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
  document.getElementById('mySessionsBtn').addEventListener('click', () => { window.location.href = 'my-sessions.html'; });
  document.getElementById('mySignupsBtn').addEventListener('click', () => { window.location.href = 'my-signups.html'; });

  // ── Sessions ──
  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 1);
  const dateFrom = sevenDaysAgo.toISOString().split('T')[0];

  const q = query(collection(db, 'sessions'), where('date', '>=', dateFrom), orderBy('date', 'asc'));
  const signupUnsubs = {};

  let deepLinkHandled = false;
  onSnapshot(q, (snap) => {
    document.getElementById('loadingSpinner').classList.add('hidden');
    allSessionsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    applyFilter();
    // 處理直接報名連結 / handle direct signup deep link
    if (!deepLinkHandled) {
      deepLinkHandled = true;
      const urlSessionId = new URLSearchParams(window.location.search).get('session');
      if (urlSessionId) {
        const target = allSessionsCache.find(s => s.id === urlSessionId);
        if (target) {
          // 切換到正確的 filter，確保場次卡片顯示 / switch to correct filter so session card is visible
          const today = new Date().toISOString().split('T')[0];
          const now2 = Date.now();
          const closeAt2 = target.closeAt ? target.closeAt.toMillis() : null;
          const isPastClose2 = closeAt2 && closeAt2 < now2;
          if ((target.date || '') < today) {
            setFilter('past');
          } else {
            setFilter('open');
          }
          // Scroll to the session card
          setTimeout(() => {
            const card = document.getElementById('card-' + urlSessionId);
            if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            // If open, also show signup modal
            const now = Date.now();
            const closeAt = target.closeAt ? target.closeAt.toMillis() : null;
            const effectivelyOpen = target.isOpen && !(closeAt && closeAt < now);
            if (effectivelyOpen) window.openSignupModal(urlSessionId, target.limit || 0);
          }, 300);
        }
      }
    }
  });

  window.setFilter = (filter) => {
    currentFilter = filter;
    const activeClass = 'text-xs font-semibold px-3 py-1.5 rounded-xl bg-indigo-600 text-white transition shrink-0';
    const idleClass = 'text-xs font-semibold px-3 py-1.5 rounded-xl bg-white border border-gray-200 text-gray-600 hover:border-indigo-300 transition shrink-0';
    ['all','open','past'].forEach(f => {
      const btn = document.getElementById('sf-' + f);
      if (btn) btn.className = f === filter ? activeClass : idleClass;
    });
    applyFilter();
  };

  window.setGenderFilter = (gender) => {
    currentGenderFilter = gender;
    const activeClass = 'text-xs px-3 py-1 rounded-lg bg-indigo-600 text-white font-semibold transition shrink-0';
    const idleClass = 'text-xs px-3 py-1 rounded-lg bg-white border border-gray-200 text-gray-500 hover:border-indigo-300 transition shrink-0';
    ['all','male','female','mixed'].forEach(g => {
      const btn = document.getElementById('sg-' + g);
      if (btn) btn.className = g === gender ? activeClass : idleClass;
    });
    applyFilter();
  };

  window.setSort = () => {
    const type = document.getElementById('sort-type-select').value;
    const dir  = document.getElementById('sort-dir-select').value;
    currentSort = type + '_' + dir;
    applyFilter();
  };

  function applyFilter() {
    const today = new Date().toISOString().split('T')[0];
    const now = Date.now();
    const filtered = allSessionsCache.filter(s => {
      if (s.cancelled) return false;
      const isPast = (s.date || '') < today;
      const closeAtMs = s.closeAt ? s.closeAt.toMillis() : null;
      const effectivelyClosed = !s.isOpen || (closeAtMs && closeAtMs < now);
      let passMain = false;
      if (currentFilter === 'all')  passMain = true;
      else if (currentFilter === 'past') passMain = isPast;
      else if (currentFilter === 'open') passMain = !isPast && !effectivelyClosed;
      else passMain = true;
      if (!passMain) return false;
      if (currentGenderFilter === 'all') return true;
      return s.type === currentGenderFilter;
    });
    // Sort
    const [sortType, sortDir] = currentSort.split('_');
    const desc = sortDir === 'desc';
    if (sortType === 'closeAt') {
      filtered.sort((a, b) => {
        const aMs = a.closeAt ? (a.closeAt.toMillis ? a.closeAt.toMillis() : +a.closeAt) : Infinity;
        const bMs = b.closeAt ? (b.closeAt.toMillis ? b.closeAt.toMillis() : +b.closeAt) : Infinity;
        return desc ? bMs - aMs : aMs - bMs;
      });
    } else {
      filtered.sort((a, b) => desc
        ? (b.date || '').localeCompare(a.date || '')
        : (a.date || '').localeCompare(b.date || ''));
    }
    const isLoading = !document.getElementById('loadingSpinner').classList.contains('hidden');
    if (!filtered.length) {
      document.getElementById('noSessionsMsg').classList.toggle('hidden', isLoading);
      document.getElementById('sessionsList').innerHTML = '';
    } else {
      document.getElementById('noSessionsMsg').classList.add('hidden');
      renderSessions(filtered);
    }
    // Update filter button labels on lang change
    const zh = getLang() === 'zh';
    const labels = { all: zh?'所有':'All', open: zh?'報名中':'Open', closed: zh?'已截止':'Closed', past: zh?'過去':'Past' };
    Object.entries(labels).forEach(([k, v]) => { const b = document.getElementById('sf-' + k); if (b) b.textContent = v; });
    const gLabels = { all: zh?'全部':'All', male: zh?'♂ 男生':'♂ Male', female: zh?'♀ 女生':'♀ Female', mixed: zh?'⚥ 混排':'⚥ Mixed' };
    Object.entries(gLabels).forEach(([k, v]) => { const b = document.getElementById('sg-' + k); if (b) b.textContent = v; });
  }

  function renderSessions(sessions) {
    const list = document.getElementById('sessionsList');
    // Remove cards for sessions no longer in list
    const existingIds = new Set([...list.querySelectorAll('[data-session-id]')].map(el => el.dataset.sessionId));
    const newIds = new Set(sessions.map(s => s.id));
    existingIds.forEach(id => { if (!newIds.has(id)) { document.getElementById('card-' + id)?.remove(); if (signupUnsubs[id]) { signupUnsubs[id](); delete signupUnsubs[id]; } } });

    sessions.forEach((s, idx) => {
      sessionsData[s.id] = s; // store for signup modal
      if (s.createdBy && s.creatorPhoto) creatorPhotoCache[s.createdBy] = s.creatorPhoto;
      let card = document.getElementById('card-' + s.id);
      if (!card) {
        card = document.createElement('div');
        card.id = 'card-' + s.id;
        card.dataset.sessionId = s.id;
        list.appendChild(card);
      }
      card.className = 'bg-white rounded-2xl shadow-sm border border-indigo-50 overflow-hidden fade-in';
      card.innerHTML = buildSessionCard(s);
      subscribeSignups(s.id, s.limit || 0, s.maleLimit || 0, s.femaleLimit || 0);
    });
  }

  function buildSessionCard(s) {
    const tl = TYPE_LABEL();
    const typeLabel = tl[s.type] || '';
    const now = Date.now();
    const openAt = s.openAt ? s.openAt.toMillis() : null;
    const closeAt = s.closeAt ? s.closeAt.toMillis() : null;
    const isPastClose = closeAt && closeAt < now;
    const effectivelyOpen = s.isOpen && !isPastClose;
    let badgeHtml = '';
    if (effectivelyOpen) {
      badgeHtml = `<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-green-100 text-green-700">${tr('open')}</span>`;
    } else if (openAt && openAt > now) {
      badgeHtml = `<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-100 text-amber-600">${tr('notYet')}</span>`;
    } else {
      badgeHtml = `<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-red-100 text-red-500">${tr('closed')}</span>`;
    }

    const equipHtml = s.equipment?.length ? `<div class="flex items-center gap-1 text-xs text-gray-500 col-span-2"><span>🎒</span><span>${tr('needsBring')}${s.equipment.map(e => escHtml(trEquip(e))).join(getLang()==='zh'?'、':', ')}</span></div><div id="equip-unclaimed-${s.id}" class="hidden text-xs text-amber-600 col-span-2"></div>` : '';
    const noteHtml = s.note ? `<div class="flex items-center gap-1 text-xs text-gray-400 col-span-2"><span>📝</span><span>${escHtml(s.note)}</span></div>` : '';
    const venueHtml = s.venue ? `<div class="flex items-center gap-1 text-xs text-gray-500 col-span-2"><span>🏟️</span><span>${escHtml(s.venue)}</span></div>` : '';
    const typeHtml = s.type ? `<div class="flex items-center gap-1"><span>🏷️</span><span>${typeLabel}</span></div>` : '';
    const limitHtml = s.limit ? `<div class="flex items-center gap-1"><span>👥</span><span>${tr('limitLabel')} ${s.limit}${tr('people')}</span></div>` : '';

    const organizerPhoto = s.creatorPhoto || (s.createdBy ? creatorPhotoCache[s.createdBy] : null);
    const organizerHtml = s.creatorName ? `
      <div class="flex items-center gap-1.5 mt-1">
        ${organizerPhoto ? `<img src="${escHtml(organizerPhoto)}" class="w-5 h-5 rounded-full border border-gray-200 shrink-0" alt="" onerror="this.style.display='none'" />` : ''}
        <p class="text-xs text-gray-400">${getLang()==='zh'?'舉辦人':'By'}: ${escHtml(s.creatorName)}</p>
      </div>` : '';
    const signedBadge = `<span id="signed-badge-${s.id}" class="hidden text-xs bg-green-100 text-green-700 font-semibold px-2.5 py-1 rounded-full shrink-0">✅ ${getLang()==='zh'?'已報名':'Signed up'}</span>`;
    const hasMixedLimits = s.type === 'mixed' && (s.maleLimit > 0 || s.femaleLimit > 0);
    const progressBar = s.limit ? (hasMixedLimits ? `
      <div id="progress-wrap-${s.id}" class="mt-3 space-y-1.5">
        <div class="flex justify-between text-xs text-gray-400 mb-0.5">
          <span>${getLang()==='zh'?'報名進度':'Progress'}</span>
          <span id="prog-text-${s.id}">0 / ${s.limit}</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="text-xs text-blue-400 w-6 shrink-0">♂</span>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
            <div id="prog-bar-male-${s.id}" class="h-2 rounded-full transition-all duration-500 bg-blue-400" style="width:0%"></div>
          </div>
          <span id="prog-text-male-${s.id}" class="text-xs text-gray-400 w-10 text-right shrink-0">0/${s.maleLimit||'?'}</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="text-xs text-pink-400 w-6 shrink-0">♀</span>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
            <div id="prog-bar-female-${s.id}" class="h-2 rounded-full transition-all duration-500 bg-pink-400" style="width:0%"></div>
          </div>
          <span id="prog-text-female-${s.id}" class="text-xs text-gray-400 w-10 text-right shrink-0">0/${s.femaleLimit||'?'}</span>
        </div>
      </div>` : `
      <div id="progress-wrap-${s.id}" class="mt-3">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
          <span>${getLang()==='zh'?'報名進度':'Progress'}</span>
          <span id="prog-text-${s.id}">0 / ${s.limit}</span>
        </div>
        <div class="bg-gray-100 rounded-full h-2.5 overflow-hidden">
          <div id="prog-bar-${s.id}" class="h-2.5 rounded-full transition-all duration-500 bg-indigo-400" style="width:0%"></div>
        </div>
      </div>`) : '';

    const isOrganizer = currentUser && s.createdBy === currentUser.uid;
    const manageBtn = isOrganizer ? `
      <a href="my-sessions.html"
        class="block w-full mt-2 text-center bg-amber-50 text-amber-700 border border-amber-200 rounded-xl py-2 font-semibold text-xs hover:bg-amber-100 transition">
        ⚙️ ${getLang() === 'zh' ? '管理場次' : 'Manage Session'}
      </a>` : '';
    const fmtTs = ms => { const d = new Date(ms); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
    const signupTimeHtml = (() => {
      const zh = getLang() === 'zh';
      if (openAt && closeAt) return `<div class="text-xs text-gray-400 mt-1">📋 ${zh?'報名時間':'Signup'}: ${fmtTs(openAt)} ~ ${fmtTs(closeAt)}</div>`;
      if (closeAt)           return `<div class="text-xs text-gray-400 mt-1">📋 ${zh?'報名截止':'Closes'}: ${fmtTs(closeAt)}</div>`;
      if (openAt)            return `<div class="text-xs text-gray-400 mt-1">📋 ${zh?'報名開始':'Opens'}: ${fmtTs(openAt)}</div>`;
      return '';
    })();
    const shareUrl = `${location.origin}${location.pathname}?session=${s.id}`;
    const signupBtnHtml = effectivelyOpen ? `
      <button id="signup-btn-${s.id}" onclick="openSignupModal('${s.id}', ${s.limit || 0})"
        class="w-full mt-4 bg-indigo-600 text-white rounded-xl py-2.5 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition">
        🙋 ${getLang() === 'zh' ? '我要報名' : 'Sign Up'}
      </button>` : '';
    const shareBtnHtml = `
      <button onclick="shareSession('${s.id}', '${escHtml(s.title || s.date + ' 零打')}')"
        class="flex items-center justify-center gap-1.5 w-full mt-2 text-xs text-gray-500 border border-gray-200 rounded-xl py-2 hover:bg-gray-50 hover:text-indigo-600 transition">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
        ${getLang() === 'zh' ? '分享活動連結' : 'Share Link'}
      </button>`;

    const countdownHtml = (openAt && openAt > now) ? `<div id="cd-${s.id}" class="bg-amber-50 border border-amber-100 rounded-xl px-3 py-2 mt-3 text-sm text-amber-700 text-center font-medium"></div>` : '';

    return `
      <div class="p-5">
        <div class="flex items-start justify-between gap-2 mb-1">
          <div>
            <h3 class="font-bold text-gray-800">${escHtml(s.title || s.date + ' 零打')}</h3>
            ${organizerHtml}
          </div>
          <div class="flex flex-col items-end gap-1 shrink-0">
            ${badgeHtml}
            ${signedBadge}
          </div>
        </div>
        <div class="grid grid-cols-2 gap-y-1.5 gap-x-4 text-sm text-gray-600 mt-3">
          <div class="flex items-center gap-1"><span>📅</span><span>${formatDate(s.date)}</span></div>
          <div class="flex items-center gap-1"><span>🕐</span><span>${s.time || '—'}</span></div>
          <div class="flex items-center gap-1 col-span-2"><span>📍</span>
            <a href="https://maps.google.com/?q=${encodeURIComponent(s.location || '')}" target="_blank" class="text-indigo-500 hover:underline">${escHtml(s.location || '—')}</a>
          </div>
          ${venueHtml}${limitHtml}${typeHtml}${equipHtml}${noteHtml}
        </div>
        ${progressBar}
        ${countdownHtml}
        ${signupTimeHtml}
        ${signupBtnHtml}
        ${manageBtn}
        ${shareBtnHtml}
      </div>
      <!-- Signup list embedded -->
      <div class="border-t border-gray-50 px-5 py-3">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs font-semibold text-gray-500">${tr('listTitle')}</p>
          <span id="cnt-${s.id}" class="text-xs bg-indigo-100 text-indigo-600 font-semibold px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="list-${s.id}" class="space-y-1.5"></div>
        <div id="empty-${s.id}" class="text-center py-3 text-gray-400 text-xs">${tr('noSignups')}</div>
      </div>`;
  }

  function subscribeSignups(sessionId, limit, maleLimit = 0, femaleLimit = 0) {
    if (signupUnsubs[sessionId]) signupUnsubs[sessionId]();
    const q2 = query(collection(db, 'sessions', sessionId, 'signups'), orderBy('signedAt', 'asc'));
    signupUnsubs[sessionId] = onSnapshot(q2, (snap) => {
      const items = snap.docs.map((d, i) => ({ id: d.id, ...d.data(), position: i + 1 }));
      renderSignupList(sessionId, items, limit, maleLimit, femaleLimit);
    });
    // start countdown if needed
    const card = document.getElementById('card-' + sessionId);
    const cdEl = document.getElementById('cd-' + sessionId);
    if (cdEl) startCountdown(cdEl);
  }

  function renderSignupList(sessionId, items, limit, maleLimit = 0, femaleLimit = 0) {
    const listEl = document.getElementById('list-' + sessionId);
    const emptyEl = document.getElementById('empty-' + sessionId);
    const cntEl = document.getElementById('cnt-' + sessionId);
    if (!listEl) return;
    cntEl && (cntEl.textContent = tr('signupCount', items.length));

    // Update progress bar
    if (limit > 0) {
      const filled = Math.min(items.length, limit);
      const textEl = document.getElementById('prog-text-' + sessionId);
      if (textEl) textEl.textContent = `${filled} / ${limit}`;

      const hasMixedBars = !!(document.getElementById('prog-bar-male-' + sessionId));
      if (hasMixedBars) {
        // Gender-split bars
        const maleCount = items.filter(s => s.gender === 'male').length;
        const femaleCount = items.filter(s => s.gender === 'female').length;
        const malePct = maleLimit > 0 ? Math.round(Math.min(maleCount, maleLimit) / maleLimit * 100) : 0;
        const femalePct = femaleLimit > 0 ? Math.round(Math.min(femaleCount, femaleLimit) / femaleLimit * 100) : 0;
        const maleBar = document.getElementById('prog-bar-male-' + sessionId);
        const femaleBar = document.getElementById('prog-bar-female-' + sessionId);
        const maleText = document.getElementById('prog-text-male-' + sessionId);
        const femaleText = document.getElementById('prog-text-female-' + sessionId);
        if (maleBar) { maleBar.style.width = malePct + '%'; maleBar.className = `h-2 rounded-full transition-all duration-500 ${malePct >= 100 ? 'bg-red-400' : 'bg-blue-400'}`; }
        if (femaleBar) { femaleBar.style.width = femalePct + '%'; femaleBar.className = `h-2 rounded-full transition-all duration-500 ${femalePct >= 100 ? 'bg-red-400' : 'bg-pink-400'}`; }
        if (maleText) maleText.textContent = `${maleCount}/${maleLimit||'?'}`;
        if (femaleText) femaleText.textContent = `${femaleCount}/${femaleLimit||'?'}`;
      } else {
        const pct = Math.round((filled / limit) * 100);
        const barEl = document.getElementById('prog-bar-' + sessionId);
        if (barEl) {
          barEl.style.width = pct + '%';
          barEl.className = `h-2.5 rounded-full transition-all duration-500 ${pct >= 100 ? 'bg-red-400' : pct >= 75 ? 'bg-amber-400' : 'bg-indigo-400'}`;
        }
      }
    }

    signupsCache[sessionId] = items;

    if (!items.length) { listEl.innerHTML = ''; emptyEl?.classList.remove('hidden'); return; }
    emptyEl?.classList.add('hidden');

    // Track user's own signup
    let foundOwnSignup = null;
    if (currentUser) {
      const own = items.find(s => s.uid && s.uid === currentUser.uid);
      if (own) foundOwnSignup = own.id;
    }
    userSignupMap[sessionId] = foundOwnSignup;
    const badge = document.getElementById('signed-badge-' + sessionId);
    if (badge) badge.classList.toggle('hidden', !foundOwnSignup);

    // Compute gender positions for sub-limit waitlisting
    if (maleLimit > 0 || femaleLimit > 0) {
      let maleCount = 0, femaleCount = 0;
      items.forEach(s => {
        if (s.gender === 'male') { maleCount++; s.genderPosition = maleCount; s.genderWait = !s.forceConfirmed && (s.forceWaitlisted || (maleLimit > 0 && maleCount > maleLimit)); }
        else if (s.gender === 'female') { femaleCount++; s.genderPosition = femaleCount; s.genderWait = !s.forceConfirmed && (s.forceWaitlisted || (femaleLimit > 0 && femaleCount > femaleLimit)); }
        else { s.genderWait = !s.forceConfirmed && !!s.forceWaitlisted; }
      });
    }

    const isFull = limit > 0 && items.length > limit;
    const hasMixedLimits = maleLimit > 0 || femaleLimit > 0;
    // When gender sub-limits exist, use genderWait regardless of isFull
    // (time-based total overflow is secondary to gender quota)
    const waitItems = hasMixedLimits ? items.filter(s => s.genderWait) : (isFull ? items.filter(s => !s.forceConfirmed && s.position > limit) : []);
    const ownIsWaitlisted = currentUser && waitItems.some(s => s.uid === currentUser.uid);

    let html = '';
    if (ownIsWaitlisted) {
      const waitMsg = getLang() === 'zh' ? '⏳ 你目前在候補名單，有人取消時會自動候補' : '⏳ You are on the waitlist — you will be promoted if a spot opens';
      html += `<div class="text-xs text-center text-amber-700 bg-amber-50 rounded-xl px-3 py-2 mb-1">${waitMsg}</div>`;
    }

    const renderItem = (s, isWait, posLabelOverride) => {
      const waitOffset = limit > 0 ? limit : 0;
      const posColor = s.position===1&&!isWait?'bg-yellow-400 text-white':s.position===2&&!isWait?'bg-gray-300 text-gray-700':s.position===3&&!isWait?'bg-amber-600 text-white':isWait?'bg-gray-200 text-gray-400':'bg-indigo-100 text-indigo-600';
      const posLabel = posLabelOverride || (isWait ? tr('waitPrefix')+(waitOffset > 0 ? s.position-waitOffset : (s.genderPosition || s.position)) : '#'+s.position);
      const tags = [];
      if (s.isLate) tags.push(`<span class="tag">${tr('lateTag')}${s.lateTime?' '+s.lateTime:''}</span>`);
      if (s.forFriend) tags.push(`<span class="tag">${tr('proxyTag')}:${escHtml(s.forFriend)}</span>`);
      if (s.pairWith) tags.push(`<span class="tag">${tr('pairTag')}:${escHtml(s.pairWith)}</span>`);
      if (s.bringEquip && s.bringEquip.length) {
        s.bringEquip.forEach(e => tags.push(`<span class="tag" style="background:#d1fae5;color:#065f46">🎒${escHtml(e)}</span>`));
      }
      const photoEl = s.photoURL ? `<img src="${s.photoURL}" class="w-7 h-7 rounded-full border border-white shadow-sm" alt="" onerror="this.style.display='none'" />` : '';
      const isOwn = currentUser && s.uid && s.uid === currentUser.uid;
      const ownBtns = isOwn ? `
        <button onclick="openEditSignupModal('${sessionId}','${s.id}')" class="text-xs text-gray-300 hover:text-indigo-400 transition shrink-0" title="${getLang()==='zh'?'編輯報名':'Edit signup'}">✏️</button>
        <button onclick="cancelSignup('${sessionId}','${s.id}')" class="text-xs text-gray-300 hover:text-red-400 transition shrink-0" title="${getLang()==='zh'?'取消報名':'Cancel signup'}">✕</button>` : '';
      const genderBorder = s.gender === 'male' ? 'border-l-4 border-l-blue-400' : s.gender === 'female' ? 'border-l-4 border-l-pink-400' : '';
      return `<div class="flex items-start gap-2 ${isWait?'opacity-60':''} ${isOwn?'bg-indigo-50 border border-indigo-100':'bg-gray-50'} ${genderBorder} rounded-xl px-3 py-2">
          <span class="min-w-7 h-7 px-1 flex items-center justify-center rounded-full text-xs font-bold ${posColor} shrink-0 mt-0.5">${posLabel}</span>
          ${photoEl}
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-800 truncate">${escHtml(s.name)}${isOwn?` <span class="text-xs text-indigo-400">(${getLang()==='zh'?'我':'me'})</span>`:''}</p>
            ${tags.length ? `<div class="flex gap-1 flex-wrap mt-0.5">${tags.join('')}</div>` : ''}
          </div>
          ${ownBtns}
        </div>`;
    };

    if (maleLimit > 0 || femaleLimit > 0) {
      // Show gender-separated sections
      const males = items.filter(s => s.gender === 'male');
      const females = items.filter(s => s.gender === 'female');
      const others = items.filter(s => s.gender !== 'male' && s.gender !== 'female');
      const zh = getLang() === 'zh';
      const renderSection = (group, gLimit, gLabel, color) => {
        if (!group.length) return '';
        const confirmed = gLimit > 0 ? group.filter(s => !s.genderWait) : group;
        const waiting = gLimit > 0 ? group.filter(s => s.genderWait) : [];
        let sec = `<div class="text-xs font-semibold ${color} px-1 mt-2 mb-1">${gLabel}${gLimit > 0 ? ` (${confirmed.length}/${gLimit})` : ` (${group.length})`}</div>`;
        confirmed.forEach((s, i) => { sec += renderItem(s, false, '#'+(i+1)); });
        if (waiting.length) {
          sec += `<div class="flex items-center gap-2 my-1"><div class="flex-1 h-px bg-gray-200"></div><span class="text-xs text-gray-400 shrink-0">${zh?'候補':'Waitlist'}</span><div class="flex-1 h-px bg-gray-200"></div></div>`;
          waiting.forEach((s, i) => { sec += renderItem(s, true, tr('waitPrefix')+(i+1)); });
        }
        return sec;
      };
      html += renderSection(males, maleLimit, zh ? '♂ 男生' : '♂ Male', 'text-blue-500');
      html += renderSection(females, femaleLimit, zh ? '♀ 女生' : '♀ Female', 'text-pink-500');
      if (others.length) {
        html += `<div class="text-xs font-semibold text-gray-400 px-1 mt-2 mb-1">${zh ? '不限' : 'Other'}</div>`;
        others.forEach((s, i) => { html += renderItem(s, limit > 0 && s.position > limit, null); });
      }
    } else {
      let separatorAdded = false;
      let waitCount = 0;
      html += items.map(s => {
        const isWait = (!s.forceConfirmed && (s.forceWaitlisted || (limit > 0 && s.position > limit))) || !!s.genderWait;
        let sep = '';
        if (isWait && !separatorAdded) {
          separatorAdded = true;
          const zh = getLang() === 'zh';
          const sepLabel = isFull
            ? (zh ? '🎉 正取名額已滿！以下為候補名單' : '🎉 Full! Waitlist below')
            : (zh ? '候補名單' : 'Waitlist');
          const sepClass = isFull ? 'text-xs text-orange-600 shrink-0' : 'text-xs text-gray-400 shrink-0';
          sep = `<div class="flex items-center gap-2 my-1"><div class="flex-1 h-px bg-gray-200"></div><span class="${sepClass}">${sepLabel}</span><div class="flex-1 h-px bg-gray-200"></div></div>`;
        }
        if (isWait) waitCount++;
        return sep + renderItem(s, isWait, isWait ? tr('waitPrefix') + waitCount : null);
      }).join('');
    }
    listEl.innerHTML = html;

    // Update signup button label based on full status
    const signupBtn = document.getElementById('signup-btn-' + sessionId);
    if (signupBtn) {
      const zh = getLang() === 'zh';
      signupBtn.textContent = isFull
        ? (zh ? '⏳ 我要排候補' : '⏳ Join Waitlist')
        : (zh ? '🙋 我要報名' : '🙋 Sign Up');
    }

    // Update unclaimed equip notice (only confirmed signups count as "claimed")
    const session = sessionsData[sessionId] || {};
    const equipList = session.equipment || [];
    const unclaimedEl = document.getElementById('equip-unclaimed-' + sessionId);
    if (unclaimedEl && equipList.length) {
      const claimed = new Set();
      const _sessLimit = session.limit || 0;
      const _hasMixed = (session.maleLimit || 0) > 0 || (session.femaleLimit || 0) > 0;
      items.forEach(item => {
        const _isWait = _hasMixed
          ? !!item.genderWait
          : !item.forceConfirmed && (item.forceWaitlisted || (_sessLimit > 0 && item.position > _sessLimit));
        if (!_isWait) (item.bringEquip || []).forEach(e => claimed.add(e));
      });
      const unclaimed = equipList.filter(e => !claimed.has(e));
      const zh2 = getLang() === 'zh';
      if (unclaimed.length) {
        unclaimedEl.textContent = `⚠️ ${zh2 ? '還沒有人帶：' : 'Unclaimed: '}${unclaimed.map(e => trEquip(e)).join(zh2 ? '、' : ', ')}`;
        unclaimedEl.classList.remove('hidden');
      } else {
        unclaimedEl.classList.add('hidden');
      }
    }
  }

  // ── Share Modal ──
  let _shareUrl = '', _shareTitle = '';

  window.shareSession = (sessionId, sessionTitle) => {
    const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
    const url = `${base}?session=${sessionId}`;
    _shareUrl = url;
    _shareTitle = sessionTitle || '';
    const zh = getLang() === 'zh';
    // Auto-copy to clipboard immediately
    navigator.clipboard.writeText(url).catch(() => {});
    // Open modal showing copied state
    document.getElementById('shareModalUrl').textContent = url;
    document.getElementById('hShareModalTitle').textContent = zh ? '分享活動連結' : 'Share Link';
    document.getElementById('hShareModalHint').textContent = zh ? '✅ 連結已複製到剪貼簿！' : '✅ Link copied to clipboard!';
    const copyBtn = document.getElementById('copyShareUrlBtn');
    copyBtn.innerHTML = `✅ <span id="hCopyShareBtn">${zh ? '已複製！' : 'Copied!'}</span>`;
    setTimeout(() => {
      copyBtn.innerHTML = `📋 <span id="hCopyShareBtn">${zh ? '再次複製' : 'Copy Again'}</span>`;
      document.getElementById('hShareModalHint').textContent = zh ? '複製以下連結讓大家報名' : 'Copy the link below to share';
    }, 3000);
    document.getElementById('hNativeShareBtn').textContent = zh ? '開啟系統分享' : 'Share via app';
    document.getElementById('hShareModalClose').textContent = zh ? '關閉' : 'Close';
    document.getElementById('nativeShareBtn').classList.toggle('hidden', !navigator.share);
    document.getElementById('shareModal').classList.remove('hidden');
  };

  window.openShareModal = (url, title) => {
    _shareUrl = url;
    _shareTitle = title || '';
    const zh = getLang() === 'zh';
    document.getElementById('shareModalUrl').textContent = url;
    document.getElementById('hShareModalTitle').textContent = zh ? '分享活動連結' : 'Share Link';
    document.getElementById('hShareModalHint').textContent = zh ? '複製以下連結讓大家報名' : 'Copy the link below to share';

      const v = document.getElementById('fOpenAt').value;
      if (v) openAt = Timestamp.fromDate(new Date(v));
      isOpen = openAt ? openAt.toMillis() <= Date.now() : false;
    } else if (openWhen === 'hours' || openWhen === 'days') {
      const n = parseInt(document.getElementById('fOpenOffset').value) || 1;
      const gameDate = new Date(`${date}T${time}:00`);
      const ms = openWhen === 'hours' ? n * 3600000 : n * 86400000;

      isOpen = openDate <= new Date();

            const ms = closeWhen === 'hours' ? offset * 3600000 : offset * 86400000;

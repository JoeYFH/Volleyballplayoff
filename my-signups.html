<!DOCTYPE html>
<html id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <script>try{var _l=localStorage.getItem('lang')||((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en');document.documentElement.lang=_l==='zh'?'zh-TW':'en';}catch(e){document.documentElement.lang='zh-TW';}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏐 我的報名</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .tag{display:inline-flex;align-items:center;gap:4px;background:#e0e7ff;color:#4338ca;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
    .tag-green{background:#d1fae5;color:#065f46}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Auth Loading -->
<div id="authLoading" class="flex items-center justify-center min-h-screen">
  <div class="text-4xl animate-bounce">🏐</div>
</div>

<!-- Login Screen -->
<div id="loginScreen" class="hidden flex items-center justify-center min-h-screen px-4">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm text-center">
    <div class="flex justify-end mb-2">
      <button id="langBtnLogin" onclick="toggleLang()"
        class="text-xs font-medium px-2.5 py-1.5 rounded-lg bg-gray-100 text-gray-500 hover:text-indigo-600 transition">EN</button>
    </div>
    <div class="text-5xl mb-3">🏐</div>
    <h1 id="hLoginTitle" class="text-xl font-bold text-gray-800 mb-1">我的報名</h1>
    <p id="hLoginHint" class="text-sm text-gray-400 mb-6">請先登入</p>
    <button id="googleLoginBtn"
      class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-xl py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 active:scale-95 transition">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" />
      <span id="hGoogleLogin">使用 Google 帳號登入</span>
    </button>
    <div class="mt-6 border-t pt-4">
      <a href="index.html" id="hBackLinkLogin" class="text-xs text-gray-400 hover:text-gray-500">← 回到報名頁面</a>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden max-w-2xl mx-auto pb-20">

  <!-- Sticky Header -->
  <div class="sticky top-0 z-10 bg-gray-50 px-4 pt-4 pb-3 border-b border-gray-100">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3">
        <a href="index.html" title="回主頁"
          class="flex items-center justify-center w-9 h-9 rounded-xl bg-white border border-gray-200 text-gray-500 hover:text-indigo-600 hover:border-indigo-300 transition shadow-sm shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
        </a>
        <h1 id="hPageTitle" class="text-xl font-bold text-gray-800">✅ 我的報名</h1>
      </div>
      <div class="flex items-center gap-2">
        <button id="langBtn3" onclick="toggleLang()"
          class="text-xs font-medium px-2.5 py-1.5 rounded-lg bg-white border border-gray-200 text-gray-500 hover:border-indigo-300 hover:text-indigo-600 transition shadow-sm">EN</button>
        <div id="userInfoSu" class="hidden items-center gap-2">
          <img id="userPhoto" src="" alt="" class="w-8 h-8 rounded-full border border-gray-200 shrink-0" />
          <div class="flex flex-col items-start gap-0.5">
            <div class="flex items-center gap-1.5">
              <p id="userName" class="text-xs font-medium text-gray-700 max-w-[80px] truncate leading-none"></p>
              <span id="adminBadgeSignups" class="hidden text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-medium leading-none">Admin</span>
            </div>
            <button id="logoutBtn" class="text-[11px] text-gray-400 hover:text-red-400 transition leading-none">登出</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Level 1: 我自己的 / 我幫別人的 -->
    <div class="flex gap-1 bg-gray-100 rounded-xl p-1 mb-2">
      <button id="mainTabSelf" onclick="switchMainTab('self')"
        class="flex-1 text-sm font-medium py-2 rounded-lg transition bg-white text-indigo-600 shadow-sm">
        🙋 <span id="hTabSelf">我自己的</span>
      </button>
      <button id="mainTabProxy" onclick="switchMainTab('proxy')"
        class="flex-1 text-sm font-medium py-2 rounded-lg transition text-gray-500 hover:text-gray-700">
        👥 <span id="hTabProxy">我幫別人的</span>
      </button>
    </div>

    <!-- Level 2: 候補 / 成功報名 / 過去 / 取消 -->
    <div class="flex gap-1 bg-gray-100 rounded-xl p-1">
      <button id="subTabWaitlist" onclick="switchSubTab('waitlist')"
        class="flex-1 text-xs font-medium py-1.5 rounded-lg transition text-gray-500 hover:text-gray-700">
        <span id="hSubTabWaitlist">⏳ 候補</span>
      </button>
      <button id="subTabConfirmed" onclick="switchSubTab('confirmed')"
        class="flex-1 text-xs font-medium py-1.5 rounded-lg transition bg-white text-indigo-600 shadow-sm">
        <span id="hSubTabConfirmed">✅ 確認</span>
      </button>
      <button id="subTabPast" onclick="switchSubTab('past')"
        class="flex-1 text-xs font-medium py-1.5 rounded-lg transition text-gray-500 hover:text-gray-700">
        <span id="hSubTabPast">📅 過去</span>
      </button>
      <button id="subTabCancelled" onclick="switchSubTab('cancelled')"
        class="flex-1 text-xs font-medium py-1.5 rounded-lg transition text-gray-500 hover:text-gray-700">
        <span id="hSubTabCancelled">✕ 取消</span>
      </button>
    </div>
    <!-- Sort controls -->
    <div class="flex justify-end gap-1.5 mt-2">
      <select id="su-sort-type-select" onchange="setSignupsSort()"
        class="text-xs px-2 py-1 rounded-lg border border-gray-200 bg-white text-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-300">
        <option value="date">📅 日期</option>
        <option value="signedAt">⏱️ 報名時間</option>
      </select>
      <select id="su-sort-dir-select" onchange="setSignupsSort()"
        class="text-xs px-2 py-1 rounded-lg border border-gray-200 bg-white text-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-300">
        <option value="asc">近→遠</option>
        <option value="desc">遠→近</option>
      </select>
    </div>
  </div>

  <div class="px-4 pt-4">
    <!-- Skeleton Loading -->
    <div id="loadingSkeletons" class="space-y-4">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <div class="skeleton h-5 w-2/3 rounded-lg mb-2"></div>
        <div class="skeleton h-3 w-1/3 rounded mb-4"></div>
        <div class="skeleton h-3 w-1/2 rounded mb-2"></div>
        <div class="skeleton h-3 w-1/3 rounded mb-4"></div>
        <div class="skeleton h-9 w-full rounded-xl"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <div class="skeleton h-5 w-3/4 rounded-lg mb-2"></div>
        <div class="skeleton h-3 w-1/4 rounded mb-4"></div>
        <div class="skeleton h-3 w-2/5 rounded mb-2"></div>
        <div class="skeleton h-3 w-1/3 rounded mb-4"></div>
        <div class="skeleton h-9 w-full rounded-xl"></div>
      </div>
    </div>

    <!-- Signups List -->
    <div id="signupsList" class="space-y-4 hidden"></div>

    <!-- Empty State -->
    <div id="noSignups" class="hidden text-center py-12 text-gray-400">
      <div class="text-5xl mb-3">📋</div>
      <p id="hNoSignups" class="text-sm font-medium">這裡沒有報名記錄</p>
      <a href="index.html" id="hGoSignup" class="mt-4 inline-block text-sm text-indigo-500 hover:underline">去報名 →</a>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div id="shareModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeShareModal()"></div>
  <div class="absolute inset-0 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm relative">
      <div class="text-center mb-4">
        <div class="text-4xl mb-2">🔗</div>
        <h3 id="hShareModalTitle" class="text-lg font-bold text-gray-800 mb-1">分享活動連結</h3>
        <p id="hShareModalHint" class="text-sm text-gray-500">複製以下連結讓大家報名</p>
      </div>
      <div class="bg-gray-50 rounded-xl px-4 py-3 mb-4 overflow-x-auto cursor-text">
        <p id="shareModalUrl" class="text-xs text-indigo-600 break-all font-mono select-all"></p>
      </div>
      <button id="copyShareUrlBtn" onclick="copyShareUrl()"
        class="w-full bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition mb-2">
        📋 <span id="hCopyShareBtn">複製連結</span>
      </button>
      <button id="nativeShareBtn" onclick="nativeShareUrl()"
        class="hidden w-full bg-gray-100 text-gray-700 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-200 active:scale-95 transition mb-2">
        ↗ <span id="hNativeShareBtn">開啟系統分享</span>
      </button>
      <button onclick="closeShareModal()"
        class="w-full bg-gray-100 text-gray-600 rounded-xl py-2 text-sm hover:bg-gray-200 transition">
        <span id="hShareModalClose">關閉</span>
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import {
    getFirestore, doc, collection, query, orderBy,
    onSnapshot, deleteDoc, getDoc, getDocs, setDoc, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
  import { firebaseConfig, ADMIN_EMAILS } from './firebase-config.js';
  import { tr, getLang, setLang } from './i18n.js';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  getRedirectResult(auth).catch(() => {});

  function signIn() {
    if (isMobile) signInWithRedirect(auth, provider);
    else signInWithPopup(auth, provider);
  }

  let currentUser = null;
  let currentSignups = [];    // from mySignups (active)
  let cancelledSignups = [];  // from cancelledSignups
  let mainTab = 'self';       // 'self' | 'proxy'
  let subTab = 'confirmed';   // 'confirmed' | 'past' | 'cancelled'
  let signupsSort = 'date_asc'; // sort state
  let dataLoaded = false;     // prevent empty-state flash before data arrives

  // Map signupId → data needed for cancel action (avoids inline JSON in onclick)
  const signupDataMap = {};

  // ── Language ──
  window.toggleLang = () => {
    setLang(getLang() === 'zh' ? 'en' : 'zh');
    applyLang();
  };

  function applyLang() {
    const zh = getLang() === 'zh';
    document.documentElement.lang = zh ? 'zh-TW' : 'en';
    document.getElementById('langBtn3').textContent = zh ? 'EN' : '中';
    const loginBtn = document.getElementById('langBtnLogin');
    if (loginBtn) loginBtn.textContent = zh ? 'EN' : '中';
    document.getElementById('hLoginTitle').textContent = zh ? '我的報名' : 'My Sign-ups';
    document.getElementById('hLoginHint').textContent = zh ? '請先登入' : 'Please sign in';
    document.getElementById('hGoogleLogin').textContent = zh ? '使用 Google 帳號登入' : 'Sign in with Google';
    document.getElementById('hBackLinkLogin').textContent = zh ? '← 回到報名頁面' : '← Back to sign-ups';
    document.getElementById('hPageTitle').textContent = zh ? '✅ 我的報名' : '✅ My Sign-ups';
    document.getElementById('hNoSignups').textContent = zh ? '這裡沒有報名記錄' : 'No sign-ups here';
    document.getElementById('hGoSignup').textContent = zh ? '去報名 →' : 'Browse sessions →';
    document.getElementById('logoutBtn').textContent = zh ? '登出' : 'Logout';
    document.getElementById('hTabSelf').textContent = zh ? '我自己的' : 'My own';
    document.getElementById('hTabProxy').textContent = zh ? '我幫別人的' : 'For others';
    document.getElementById('hSubTabWaitlist').textContent = zh ? '⏳ 候補' : '⏳ Waitlist';
    document.getElementById('hSubTabConfirmed').textContent = zh ? '✅ 確認' : '✅ Confirmed';
    document.getElementById('hSubTabPast').textContent = zh ? '📅 過去' : '📅 Past';
    document.getElementById('hSubTabCancelled').textContent = zh ? '✕ 取消' : '✕ Cancelled';
    const suTypeSel = document.getElementById('su-sort-type-select');
    if (suTypeSel) {
      suTypeSel.options[0].text = zh ? '📅 日期' : '📅 Date';
      suTypeSel.options[1].text = zh ? '⏱️ 報名時間' : '⏱️ Signed At';
    }
    const suDirSel = document.getElementById('su-sort-dir-select');
    if (suDirSel) {
      suDirSel.options[0].text = zh ? '近→遠' : 'Near→Far';
      suDirSel.options[1].text = zh ? '遠→近' : 'Far→Near';
    }
    if (dataLoaded) renderSignups();
  }

  // ── Auth ──
  document.getElementById('googleLoginBtn').addEventListener('click', signIn);
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    document.getElementById('authLoading').classList.add('hidden');
    if (user) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      const photo = document.getElementById('userPhoto');
      if (user.photoURL) photo.src = user.photoURL;
      document.getElementById('userName').textContent = user.displayName || user.email;
      const uiSu = document.getElementById('userInfoSu');
      uiSu.classList.remove('hidden'); uiSu.classList.add('flex');
      const adminBadge = document.getElementById('adminBadgeSignups');
      if (adminBadge) adminBadge.classList.toggle('hidden', !(ADMIN_EMAILS || []).includes(user.email));
      loadMySignups();
    } else {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('mainApp').classList.add('hidden');
    }
  });

  // ── Load ──
  function loadMySignups() {
    // Active signups
    const q = query(collection(db, 'users', currentUser.uid, 'mySignups'), orderBy('signedAt', 'desc'));
    onSnapshot(q, async (snap) => {
      document.getElementById('loadingSkeletons').classList.add('hidden');
      if (snap.empty) {
        currentSignups = [];
        dataLoaded = true;
        renderSignups();
        return;
      }
      const raw = snap.docs.map(d => ({ mirrorId: d.id, ...d.data() }));
      const enriched = await Promise.all(raw.map(async (m) => {
        try {
          const [sessionSnap, signupSnap] = await Promise.all([
            getDoc(doc(db, 'sessions', m.sessionId)),
            m.signupId ? getDoc(doc(db, 'sessions', m.sessionId, 'signups', m.signupId)) : null,
          ]);
          const signupData = signupSnap?.exists() ? signupSnap.data() : {};
          const sess = sessionSnap.exists() ? sessionSnap.data() : null;
          // 場次已刪除，清理孤兒 mySignups 記錄
          if (!sess) {
            deleteDoc(doc(db, 'users', currentUser.uid, 'mySignups', m.mirrorId)).catch(() => {});
            return null;
          }
          // Determine waitlist status and position
          let isWaitlisted = !signupData.forceConfirmed && (signupData.forceWaitlisted || !!signupData.genderWait || false);
          let waitlistPosition = 0;
          if (!signupData.forceConfirmed && !isWaitlisted && sess?.limit > 0 && m.signupId) {
            try {
              const allSnap = await getDocs(query(collection(db, 'sessions', m.sessionId, 'signups'), orderBy('signedAt', 'asc')));
              const pos = allSnap.docs.findIndex(d => d.id === m.signupId) + 1;
              if (pos > 0 && pos > sess.limit) {
                isWaitlisted = true;
                waitlistPosition = pos - sess.limit;
              }
            } catch(e) {}
          }
          return {
            id: m.signupId || m.mirrorId,
            sessionId: m.sessionId,
            signedAt: m.signedAt,
            ...signupData,
            session: sess,
            isWaitlisted,
            waitlistPosition,
          };
        } catch(e) {
          return { id: m.signupId || m.mirrorId, sessionId: m.sessionId, signedAt: m.signedAt, session: null, isWaitlisted: false };
        }
      }));
      currentSignups = enriched.filter(Boolean);
      dataLoaded = true;
      renderSignups();
    }, (err) => {
      console.error('loadMySignups error:', err);
      document.getElementById('loadingSkeletons').classList.add('hidden');
      dataLoaded = true;
      renderSignups();
    });

    // Cancelled signups
    const qC = query(collection(db, 'users', currentUser.uid, 'cancelledSignups'), orderBy('cancelledAt', 'desc'));
    onSnapshot(qC, (snap) => {
      cancelledSignups = snap.docs.map(d => ({ id: d.id, cancelled: true, ...d.data() }));
      if (subTab === 'cancelled') renderSignups();
    }, () => {});
  }

  // ── Tab switching ──
  window.setSignupsSort = () => {
    const type = document.getElementById('su-sort-type-select').value;
    const dir  = document.getElementById('su-sort-dir-select').value;
    signupsSort = type + '_' + dir;
    renderSignups();
  };

  window.switchMainTab = (tab) => {
    mainTab = tab;
    const activeM = 'flex-1 text-sm font-medium py-2 rounded-lg transition bg-white shadow-sm';
    const inactiveM = 'flex-1 text-sm font-medium py-2 rounded-lg transition text-gray-500 hover:text-gray-700';
    document.getElementById('mainTabSelf').className = mainTab === 'self' ? activeM + ' text-indigo-600' : inactiveM;
    document.getElementById('mainTabProxy').className = mainTab === 'proxy' ? activeM + ' text-purple-600' : inactiveM;
    renderSignups();
  };

  window.switchSubTab = (tab) => {
    subTab = tab;
    updateSubTabStyles();
    renderSignups();
  };

  function updateSubTabStyles() {
    const inactiveS = 'flex-1 text-xs font-medium py-1.5 rounded-lg transition text-gray-500 hover:text-gray-700';
    const activeStyles = {
      waitlist:  'flex-1 text-xs font-medium py-1.5 rounded-lg transition bg-orange-100 text-orange-600 shadow-sm font-semibold',
      confirmed: 'flex-1 text-xs font-medium py-1.5 rounded-lg transition bg-indigo-100 text-indigo-700 shadow-sm font-semibold',
      past:      'flex-1 text-xs font-medium py-1.5 rounded-lg transition bg-gray-200 text-gray-700 shadow-sm font-semibold',
      cancelled: 'flex-1 text-xs font-medium py-1.5 rounded-lg transition bg-red-100 text-red-500 shadow-sm font-semibold',
    };
    ['waitlist', 'confirmed', 'past', 'cancelled'].forEach(t => {
      const btn = document.getElementById('subTab' + t.charAt(0).toUpperCase() + t.slice(1));
      if (btn) btn.className = t === subTab ? activeStyles[t] : inactiveS;
    });
  }

  // ── Render ──
  function renderSignups() {
    const today = new Date().toISOString().split('T')[0];
    const list = document.getElementById('signupsList');
    const noEl = document.getElementById('noSignups');

    let items = [];
    if (subTab === 'cancelled') {
      items = cancelledSignups.filter(s =>
        mainTab === 'proxy' ? !!(s.forFriend) : !(s.forFriend)
      );
    } else {
      const byPerson = currentSignups.filter(s =>
        mainTab === 'proxy' ? !!(s.forFriend) : !(s.forFriend)
      );
      if (subTab === 'waitlist') {
        items = byPerson.filter(s => s.isWaitlisted && (s.session?.date || s.sessionDate || '') >= today);
      } else if (subTab === 'confirmed') {
        items = byPerson.filter(s => !s.isWaitlisted && (s.session?.date || s.sessionDate || '') >= today);
      } else { // past
        items = byPerson.filter(s => {
          const d = s.session?.date || s.sessionDate || '';
          return d && d < today;
        });
      }
    }

    // Sort
    const [sortType, sortDir] = signupsSort.split('_');
    const desc = sortDir === 'desc';
    if (sortType === 'signedAt') {
      items.sort((a, b) => {
        const aMs = a.signedAt?.toMillis ? a.signedAt.toMillis() : (a.signedAt?.seconds ? a.signedAt.seconds * 1000 : 0);
        const bMs = b.signedAt?.toMillis ? b.signedAt.toMillis() : (b.signedAt?.seconds ? b.signedAt.seconds * 1000 : 0);
        return desc ? bMs - aMs : aMs - bMs;
      });
    } else {
      items.sort((a, b) => {
        const ad = a.session?.date || a.sessionDate || '';
        const bd = b.session?.date || b.sessionDate || '';
        return desc ? bd.localeCompare(ad) : ad.localeCompare(bd);
      });
    }

    // Build signupDataMap for cancel action
    items.forEach(s => {
      const sess = s.session;
      signupDataMap[s.id] = {
        sessionId: s.sessionId || '',
        title: sess?.title || s.sessionTitle || '',
        date: sess?.date || s.sessionDate || '',
        time: sess?.time || s.sessionTime || '',
        location: sess?.location || s.sessionLocation || '',
        venue: sess?.venue || s.sessionVenue || '',
        name: s.name || '',
        forFriend: s.forFriend || '',
      };
    });

    if (!items.length) {
      list.classList.add('hidden');
      noEl.classList.remove('hidden');
    } else {
      list.classList.remove('hidden');
      noEl.classList.add('hidden');
      list.innerHTML = items.map(s => buildSignupCard(s)).join('');
    }
  }

  // ── Card ──
  function buildSignupCard(s) {
    const isCancelled = !!s.cancelled;
    const sess = s.session;
    const zh = getLang() === 'zh';
    const title = sess?.title || s.sessionTitle || (s.sessionDate ? s.sessionDate + (zh ? ' 零打' : ' Pickup') : '—');
    const date = sess?.date || s.sessionDate || '';
    const time = sess?.time || s.sessionTime || '';
    const location = sess?.location || s.sessionLocation || '';
    const venue = sess?.venue || s.sessionVenue || '';

    const isPast = date && date < new Date().toISOString().split('T')[0];
    const isOpen = sess?.isOpen;

    let statusBadge;
    if (isCancelled) {
      statusBadge = `<span class="text-xs px-2.5 py-1 rounded-full bg-red-50 text-red-400">${zh?'已取消':'Cancelled'}</span>`;
    } else if (isPast) {
      statusBadge = `<span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-500">${zh?'已結束':'Ended'}</span>`;
    } else if (isOpen) {
      statusBadge = `<span class="text-xs px-2.5 py-1 rounded-full bg-green-100 text-green-700">${zh?'報名中':'Open'}</span>`;
    } else {
      statusBadge = `<span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-500">${zh?'已截止':'Closed'}</span>`;
    }

    const isProxy = !!(s.forFriend);
    let registrantHtml = '';
    if (isProxy) {
      registrantHtml = `<div class="flex items-center gap-1.5 mt-1 mb-2">
        <span class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium">👥 ${zh?'代報':'Proxy'}</span>
        <span class="text-sm font-semibold text-purple-800">${escHtml(s.forFriend)}</span>
        ${s.name ? `<span class="text-xs text-gray-400">(${zh?'由':'by'} ${escHtml(s.name)})</span>` : ''}
      </div>`;
    } else if (s.name) {
      registrantHtml = `<div class="flex items-center gap-1.5 mt-1 mb-2">
        <span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-medium">🙋 ${zh?'本人':'Self'}</span>
        <span class="text-sm font-semibold text-gray-800">${escHtml(s.name)}</span>
      </div>`;
    }

    const tags = [];
    if (s.isLate) tags.push(`<span class="tag">${zh?'晚到':'Late'}${s.lateTime?' '+s.lateTime:''}</span>`);
    if (s.pairWith) tags.push(`<span class="tag">${zh?'搭檔':'Pair'}:${escHtml(s.pairWith)}</span>`);
    if (s.bringEquip?.length) s.bringEquip.forEach(e => tags.push(`<span class="tag tag-green">🎒 ${escHtml(trEquip(e))}</span>`));

    const calLinks = buildCalendarLinks({ title, date, time, location, venue, equipment: s.bringEquip, note: sess?.note, zh });

    let signedAtStr = '';
    if (s.signedAt) {
      try {
        const dt = s.signedAt.toDate ? s.signedAt.toDate() : new Date(s.signedAt.seconds * 1000);
        signedAtStr = zh
          ? `${dt.getMonth()+1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())} 報名`
          : `Signed ${dt.getMonth()+1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
      } catch(e) {}
    }

    // Waitlist badge
    const waitlistBadge = s.isWaitlisted
      ? `<span class="text-xs px-2.5 py-1 rounded-full bg-orange-50 text-orange-500 font-medium">⏳ ${s.waitlistPosition > 0 ? (zh ? `備取第 ${s.waitlistPosition} 個` : `Waitlist #${s.waitlistPosition}`) : (zh ? '候補中' : 'Waitlisted')}</span>`
      : '';

    // Share signup link button (only when session is open and not past)
    const shareBtn = (!isCancelled && !isPast && isOpen)
      ? `<button onclick="shareSignupLink('${escHtml(s.sessionId)}', '${escHtml(title)}')"
          class="flex items-center justify-center gap-1.5 w-full mt-2 text-xs text-gray-500 border border-gray-200 rounded-xl py-2 hover:bg-gray-50 hover:text-indigo-600 transition">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
          ${zh?'分享活動連結':'Share Link'}
        </button>`
      : '';

    // Footer: cancelled notice / cancel button / past notice
    let footer = '';
    if (isCancelled) {
      let cancelStr = zh ? '已取消' : 'Cancelled';
      if (s.cancelledAt) {
        try {
          const dt = s.cancelledAt.toDate ? s.cancelledAt.toDate() : new Date(s.cancelledAt.seconds * 1000);
          cancelStr = zh ? `${dt.getMonth()+1}/${dt.getDate()} 取消` : `Cancelled ${dt.getMonth()+1}/${dt.getDate()}`;
        } catch(e) {}
      }
      footer = `<p class="text-center text-xs text-red-300">✕ ${cancelStr}</p>`;
    } else if (!isPast) {
      const sid = escHtml(s.sessionId);
      const id = escHtml(s.id);
      footer = `<button onclick="cancelMySignup('${sid}','${id}')"
        class="w-full text-xs text-red-400 border border-red-100 rounded-xl py-2 hover:bg-red-50 transition mt-2">
        ✕ ${zh?'取消報名':'Cancel Sign-up'}
      </button>`;
    } else {
      footer = `<p class="text-center text-xs text-gray-300">${zh?'已結束場次':'Past session'}</p>`;
    }

    const borderClass = isCancelled ? 'border-red-100 opacity-75' : isProxy ? 'border-purple-100' : 'border-gray-100';

    return `
      <div class="bg-white rounded-2xl shadow-sm border ${borderClass} p-4 fade-in">
        <div class="flex items-start justify-between gap-2 mb-1">
          <div>
            <p class="font-bold text-gray-800">${escHtml(title)}</p>
            ${sess?.creatorName ? `<div class="flex items-center gap-1.5 mt-0.5">
              ${sess.creatorPhoto ? `<img src="${escHtml(sess.creatorPhoto)}" class="w-4 h-4 rounded-full border border-gray-200 shrink-0" alt="" onerror="this.style.display='none'" />` : ''}
              <p class="text-xs text-gray-400">${getLang()==='zh'?'舉辦人':'By'}: ${escHtml(sess.creatorName)}</p>
            </div>` : ''}
          </div>
          <div class="flex flex-col items-end gap-1">${statusBadge}${waitlistBadge}</div>
        </div>
        ${registrantHtml}
        ${tags.length ? `<div class="flex flex-wrap gap-1.5 mb-3">${tags.join('')}</div>` : ''}
        <div class="space-y-1.5 text-sm text-gray-600 mb-4">
          ${date ? `<div class="flex items-center gap-2"><span>📅</span><span>${formatDate(date)}</span></div>` : ''}
          ${time ? `<div class="flex items-center gap-2"><span>🕐</span><span>${time}</span></div>` : ''}
          ${location ? `<div class="flex items-center gap-2"><span>📍</span><a href="https://maps.google.com/?q=${encodeURIComponent(location)}" target="_blank" class="text-indigo-500 hover:underline">${escHtml(location)}</a></div>` : ''}
          ${venue ? `<div class="flex items-center gap-2"><span>🏟️</span><span>${escHtml(venue)}</span></div>` : ''}
          ${signedAtStr ? `<div class="flex items-center gap-2"><span>⏱️</span><span class="text-xs text-gray-400">${signedAtStr}</span></div>` : ''}
        </div>
        ${!isCancelled && !isPast ? `<div class="flex flex-wrap gap-2 mb-3">
          <a href="${calLinks.google}" target="${calLinks.calTarget}"
            class="flex items-center gap-1.5 text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition font-medium">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            Google ${zh?'日曆':'Calendar'}
          </a>
          <a href="${calLinks.apple}" download="event.ics"
            class="flex items-center gap-1.5 text-xs bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-200 transition font-medium">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            Apple ${zh?'日曆':'Calendar'}
          </a>
        </div>` : ''}
        ${shareBtn}
        ${footer}
      </div>`;
  }

  // ── Share ──
  let _shareUrl = '', _shareTitle = '';

  window.shareSignupLink = (sessionId, sessionTitle) => {
    const base = location.origin + location.pathname.replace(/[^/]*$/, '');
    _shareUrl = `${base}index.html?session=${sessionId}`;
    _shareTitle = sessionTitle || '';
    const zh = getLang() === 'zh';
    navigator.clipboard.writeText(_shareUrl).catch(() => {});
    document.getElementById('shareModalUrl').textContent = _shareUrl;
    document.getElementById('hShareModalTitle').textContent = zh ? '分享活動連結' : 'Share Link';
    document.getElementById('hShareModalHint').textContent = zh ? '✅ 連結已複製到剪貼簿！' : '✅ Link copied to clipboard!';
    const copyBtn = document.getElementById('copyShareUrlBtn');
    copyBtn.innerHTML = `✅ <span id="hCopyShareBtn">${zh ? '已複製！' : 'Copied!'}</span>`;
    setTimeout(() => {
      copyBtn.innerHTML = `📋 <span id="hCopyShareBtn">${zh ? '再次複製' : 'Copy Again'}</span>`;
      document.getElementById('hShareModalHint').textContent = zh ? '複製以下連結讓大家報名' : 'Copy the link below to share';
    }, 3000);
    document.getElementById('hNativeShareBtn').textContent = zh ? '開啟系統分享' : 'Share via app';
    document.getElementById('hShareModalClose').textContent = zh ? '關閉' : 'Close';
    document.getElementById('nativeShareBtn').classList.toggle('hidden', !navigator.share);
    document.getElementById('shareModal').classList.remove('hidden');
  };

  window.closeShareModal = () => document.getElementById('shareModal').classList.add('hidden');

  window.copyShareUrl = () => {
    const zh = getLang() === 'zh';
    const btn = document.getElementById('copyShareUrlBtn');
    navigator.clipboard.writeText(_shareUrl).then(() => {
      btn.innerHTML = `✅ <span id="hCopyShareBtn">${zh ? '已複製！' : 'Copied!'}</span>`;
      setTimeout(() => { btn.innerHTML = `📋 <span id="hCopyShareBtn">${zh ? '複製連結' : 'Copy Link'}</span>`; }, 2000);
    }).catch(() => { prompt(zh ? '請複製以下連結：' : 'Copy the link:', _shareUrl); });
  };

  window.nativeShareUrl = async () => {
    try { await navigator.share({ title: '🏐 ' + _shareTitle, url: _shareUrl }); closeShareModal(); } catch(e) {}
  };

  // ── Cancel ──
  window.cancelMySignup = async (sessionId, signupId) => {
    const zh = getLang() === 'zh';
    if (!confirm(zh ? '確定要取消報名？' : 'Cancel your signup?')) return;
    const info = signupDataMap[signupId] || {};
    try {
      // Save cancelled record
      await setDoc(doc(db, 'users', currentUser.uid, 'cancelledSignups', signupId), {
        sessionId: sessionId,
        sessionTitle: info.title || '',
        sessionDate: info.date || '',
        sessionTime: info.time || '',
        sessionLocation: info.location || '',
        sessionVenue: info.venue || '',
        name: info.name || '',
        forFriend: info.forFriend || '',
        cancelledAt: serverTimestamp(),
      });
      // Delete from sessions collection
      await deleteDoc(doc(db, 'sessions', sessionId, 'signups', signupId));
      // Clean up mirror
      try { await deleteDoc(doc(db, 'users', currentUser.uid, 'mySignups', signupId)); } catch(e) {}
    } catch(e) {
      alert((zh ? '取消失敗：' : 'Failed: ') + e.message);
    }
  };

  // ── Calendar links ──
  function buildCalendarLinks({ title, date, time, location, venue, equipment, note, zh }) {
    if (!date) return { google: '#', apple: '#' };
    const [year, month, day] = date.split('-');
    const [hh, mm] = (time || '00:00').split(':');
    const start = new Date(year, month - 1, day, hh, mm);
    const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
    const fmt = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
    const utcStart = fmt(start);
    const utcEnd = fmt(end);
    const fullLoc = location || '';
    const descParts = [zh ? '排球零打 - ' + title : 'Volleyball Pickup - ' + title];
    if (venue) descParts.push(venue);
    if (equipment?.length) descParts.push((zh ? '需攜帶：' : 'Bring: ') + equipment.map(e => zh ? e : (_equipMap[e] || e)).join(zh ? '、' : ', '));
    const desc = descParts.join('\n');
    const googleWebUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('🏐 ' + title)}&dates=${utcStart}/${utcEnd}&details=${encodeURIComponent(desc)}&location=${encodeURIComponent(fullLoc)}`;
    const isAndroid = /Android/i.test(navigator.userAgent);
    const google = isAndroid
      ? `intent://calendar.google.com/calendar/r/eventedit?text=${encodeURIComponent('🏐 ' + title)}&dates=${utcStart}/${utcEnd}&details=${encodeURIComponent(desc)}&location=${encodeURIComponent(fullLoc)}#Intent;scheme=https;package=com.google.android.calendar;S.browser_fallback_url=${encodeURIComponent(googleWebUrl)};end`
      : googleWebUrl;
    const calTarget = isAndroid ? '_self' : '_blank';
    const icsContent = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART:${utcStart}`,`DTEND:${utcEnd}`,`SUMMARY:🏐 ${title}`,`LOCATION:${fullLoc}`,`DESCRIPTION:${desc.replace(/\n/g,'\\n')}`,'END:VEVENT','END:VCALENDAR'].join('\n');
    const apple = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(icsContent);
    return { google, apple, calTarget };
  }

  function formatDate(d) {
    if (!d) return '—';
    const dt = new Date(d + 'T00:00:00');
    if (getLang() === 'en') return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', weekday:'short', year:'numeric' });
    const days = ['日','一','二','三','四','五','六'];
    return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} (週${days[dt.getDay()]})`;
  }

  function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const _equipMap = { '標竿': 'Pole', '音響': 'Speaker', '球': 'Ball' };
  function trEquip(e) { return getLang() === 'zh' ? e : (_equipMap[e] || e); }
  function pad(n) { return String(n).padStart(2,'0'); }

  updateSubTabStyles();
  applyLang();
</script>

<!-- FAB Navigation -->
<div id="fabContainerSu" class="fixed bottom-6 right-5 z-40 flex flex-col items-end gap-2">
  <div id="fabMenuSu" style="display:none" class="flex-col items-end gap-2 mb-1">
    <a href="index.html"
      class="flex items-center gap-2 bg-white border border-indigo-100 shadow-md rounded-full px-4 py-2 text-sm font-medium text-indigo-700 hover:bg-indigo-50 transition whitespace-nowrap">
      🏐 <span id="fabLinkIndexSu">報名頁面</span>
    </a>
    <a href="my-sessions.html"
      class="flex items-center gap-2 bg-white border border-indigo-100 shadow-md rounded-full px-4 py-2 text-sm font-medium text-indigo-700 hover:bg-indigo-50 transition whitespace-nowrap">
      📋 <span id="fabLinkSessionsSu">我的開場</span>
    </a>
  </div>
  <button id="fabBtnSu" onclick="toggleFabSu()"
    class="w-14 h-14 rounded-full bg-indigo-600 text-white shadow-lg flex items-center justify-center hover:bg-indigo-700 active:scale-95 transition-all">
    <svg id="fabIconSu" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24">
      <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
    </svg>
  </button>
</div>
<script>
  const FAB_MENU_SVG_SU = `<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>`;
  const FAB_CLOSE_SVG_SU = `<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>`;
  function toggleFabSu() {
    const menu = document.getElementById('fabMenuSu');
    const btn = document.getElementById('fabBtnSu');
    const isOpen = menu.style.display !== 'none';
    menu.style.display = isOpen ? 'none' : 'flex';
    btn.innerHTML = isOpen ? FAB_MENU_SVG_SU : FAB_CLOSE_SVG_SU;
  }
  function closeFabSu() {
    const menu = document.getElementById('fabMenuSu');
    if (menu.style.display !== 'none') {
      menu.style.display = 'none';
      document.getElementById('fabBtnSu').innerHTML = FAB_MENU_SVG_SU;
    }
  }
  document.addEventListener('click', (e) => {
    // Use composedPath() so detached nodes (after btn.innerHTML replacement) still match
    const path = e.composedPath ? e.composedPath() : [];
    if (!path.some(el => el && el.id === 'fabContainerSu')) closeFabSu();
  });
  document.addEventListener('DOMContentLoaded', () => {
    const updateFabLabelsSu = () => {
      const zh = localStorage.getItem('lang') !== 'en';
      document.getElementById('fabLinkIndexSu').textContent = zh ? '報名頁面' : 'Sign-up Page';
      document.getElementById('fabLinkSessionsSu').textContent = zh ? '我的開場' : 'My Sessions';
    };
    updateFabLabelsSu();
    setTimeout(updateFabLabelsSu, 500);
  });
</script>
</body>

  <line x1="755"  y1="533" x2="755"  y2="630" stroke="#1e3565" stroke-width="4"/>
  <line x1="855"  y1="533" x2="855"  y2="630" stroke="#1e3565" stroke-width="4"/>
  <line x1="955"  y1="533" x2="955"  y2="630" stroke="#1e3565" stroke-width="4"/>
  <line x1="1055" y1="533" x2="1055" y2="630" stroke="#1e3565" stroke-width="4"/>

  <line x1="355"  y1="533" x2="355"  y2="630" stroke="#1e3565" stroke-width="4"/>
  <line x1="455"  y1="533" x2="455"  y2="630" stroke="#1e3565" stroke-width="4"/>
  <line x1="555"  y1="533" x2="555"  y2="630" stroke="#1e3565" stroke-width="4"/>

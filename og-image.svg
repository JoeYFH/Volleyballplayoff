<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a3a"/>
      <stop offset="100%" style="stop-color:#1a3560"/>
    </linearGradient>
    <radialGradient id="ballShine" cx="35%" cy="28%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.45"/>
      <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="ballBottomShadow" cx="50%" cy="90%" r="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="ballClip">
      <circle cx="330" cy="280" r="205"/>
    </clipPath>
    <filter id="lightGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ballGlowFilter" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <circle cx="1160" cy="50" r="280" fill="white" fill-opacity="0.018"/>
  <circle cx="60" cy="570" r="200" fill="white" fill-opacity="0.018"/>


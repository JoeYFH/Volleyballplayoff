  <circle cx="55"   cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="155"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="255"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="355"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="455"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="555"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="655"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="755"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="855"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="955"  cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="1055" cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>
  <circle cx="1155" cy="529" r="5" fill="#ffffff" fill-opacity="0.88"/>

  <!-- ===== VOLLEYBALL ===== -->
  <!-- Drop shadow ellipse -->
  <ellipse cx="335" cy="510" rx="155" ry="20" fill="black" fill-opacity="0.18"/>

  <!-- Yellow base circle with soft glow -->
  <circle cx="330" cy="280" r="205" fill="#f5c71a" filter="url(#ballGlowFilter)"/>

  <!-- Left blue Mikasa panel -->
  <path d="M 330,75
           C 285,100 210,160 195,220
           C 185,265 195,305 215,340
           C 235,375 280,435 330,485
           A 205,205 0 0 0 330,75 Z"
        fill="#1535a0" clip-path="url(#ballClip)"/>

  <!-- Right blue Mikasa panel -->
  <path d="M 330,75
           C 375,100 450,160 465,220
           C 475,265 465,305 445,340
           C 425,375 380,435 330,485
           A 205,205 0 0 1 330,75 Z"
        fill="#1535a0" clip-path="url(#ballClip)"/>

  <!-- Seam lines -->
  <path d="M 330,75
           C 285,100 210,160 195,220
           C 185,265 195,305 215,340
           C 235,375 280,435 330,485"
        fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.5"
        clip-path="url(#ballClip)"/>
  <path d="M 330,75
           C 375,100 450,160 465,220
           C 475,265 465,305 445,340
           C 425,375 380,435 330,485"
        fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.5"

  <rect x="843"  y="524" width="24" height="12" rx="4" fill="#1a2d55"/>
  <rect x="943"  y="524" width="24" height="12" rx="4" fill="#1a2d55"/>
  <rect x="1043" y="524" width="24" height="12" rx="4" fill="#1a2d55"/>
  <rect x="1143" y="524" width="24" height="12" rx="4" fill="#1a2d55"/>


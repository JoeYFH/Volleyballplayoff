  <!-- Ball border ring -->
  <circle cx="330" cy="280" r="205" fill="none" stroke="#e6b000" stroke-width="3" stroke-opacity="0.5"/>

  <!-- Subtle separator -->
  <line x1="615" y1="80" x2="615" y2="520" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

